<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Action Core Prototype - Ghostblade Stance</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            user-select: none;
            backdrop-filter: blur(8px);
            border-left: 5px solid #d32f2f;
            max-width: 280px;
            transition: border-color 0.3s ease;
        }
        .instruction {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.2em;
            color: #1a1a1a;
        }
        .key-group {
            margin-top: 10px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        .key {
            background: #333;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            margin-right: 4px;
        }
        #pause-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 4px;
            background: #333;
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        #stance-badge {
            background: #4CAF50;
            transition: background-color 0.3s ease;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <div class="instruction">FS Action Refinement</div>
        <div class="status-badge">CHARACTER: FS (Ghostblade)</div>
        <div id="stance-badge" class="status-badge">상태: 평화 (납도)</div>
        <div id="hp-badge" class="status-badge" style="background: #e91e63;">피격 횟수: 0 / 10</div>
        
        <div class="key-group" style="margin-top: 15px;">
            <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 카메라 기준 이동</div>
            <div><span class="key">Shift</span> 회피 (전방 / 백대시)</div>
            <div><span class="key">L-Click</span> 전방 공격 (3단 베기)</div>
            <div><span class="key">Shift</span> + <span class="key">L-Click</span> 대시 공격 (→ 2타 연계)</div>
            <div><span class="key">R-Click</span> (Hold) 카메라 회전</div>
        </div>
        
        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ddd; font-size: 0.9em;">
            <p style="margin: 0 0 10px 0; color: #555;">💡 적 반경 8m 이내 접근 시<br>자동으로 전투 태세로 전환됩니다.</p>
            <label style="cursor: pointer; display: flex; align-items: center; margin-bottom: 8px;">
                <input type="checkbox" id="cb-debug-axis" style="margin-right: 10px;"> 🟢 관절 디버그 뷰
            </label>
            <label style="cursor: pointer; display: flex; align-items: center;">
                <input type="checkbox" id="cb-npc-ai" style="margin-right: 10px;"> 🤖 적 AI 활성화
            </label>
        </div>
    </div>
    
    <div id="pause-overlay">
        <h1>PAUSED</h1>
        <p>화면을 클릭하면 재개됩니다.</p>
    </div>

    <!-- [추가] 게임 오버 레이어 -->
    <div id="gameover-overlay" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(139, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200;">
        <h1 style="font-size: 4em; margin-bottom: 0.2em; text-shadow: 0 0 20px rgba(0,0,0,0.5);">GAME OVER</h1>
        <p style="font-size: 1.5em; margin-bottom: 1.5em; opacity: 0.9;">10회 피격되었습니다.</p>
        <button id="restart-btn" style="padding: 15px 40px; font-size: 1.25em; font-weight: bold; color: white; background: #333; border: 2px solid white; border-radius: 8px; cursor: pointer; transition: all 0.2s;">다시 시작</button>
    </div>

    <!-- [추가] 슬로우 모션 연출용 오버레이 -->
    <div id="slowmo-overlay" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 150, 255, 0.15); pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 10; display: block;"></div>

    <div id="distance-label" style="position: absolute; transform: translate(-50%, -100%); font-weight: bold; font-size: 1.25em; color: #ffeb3b; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); pointer-events: none; display: none; z-index: 50;"></div>

    <canvas id="game-canvas"></canvas>

    <script>
        /**
         * ==========================================
         * [1] Input Manager
         * ==========================================
         */
        class InputManager {
            constructor() {
                this.keys = { 'w': false, 'a': false, 's': false, 'd': false, 'shift': false };
                this.isLeftMouseDown = false; this.isRightMouseDown = false;
                this.mouseMovement = { x: 0, y: 0 };
                this.attackTriggered = false; this.shiftTriggered = false;  

                window.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'shift') this.shiftTriggered = true;
                    if (this.keys.hasOwnProperty(key)) this.keys[key] = true;
                });
                window.addEventListener('keyup', (e) => {
                    const key = e.key.toLowerCase();
                    if (this.keys.hasOwnProperty(key)) this.keys[key] = false;
                });
                window.addEventListener('mousedown', (e) => {
                    if (e.target.closest('#ui-layer')) return;
                    if (e.button === 0) { this.isLeftMouseDown = true; this.attackTriggered = true; }
                    if (e.button === 2) this.isRightMouseDown = true;
                });
                window.addEventListener('mouseup', (e) => {
                    if (e.button === 0) this.isLeftMouseDown = false;
                    if (e.button === 2) this.isRightMouseDown = false;
                });
                window.addEventListener('mousemove', (e) => {
                    this.mouseMovement.x = e.movementX; this.mouseMovement.y = e.movementY;
                });
                window.addEventListener('contextmenu', e => e.preventDefault());
            }
            resetTriggers() {
                this.attackTriggered = false; this.shiftTriggered = false;  
                this.mouseMovement.x = 0; this.mouseMovement.y = 0;
            }
        }

        /**
         * ==========================================
         * [2] Camera Rig
         * ==========================================
         */
        class CameraRig {
            constructor(camera, target, input) {
                this.camera = camera; this.target = target; this.input = input;
                this.distance = 6.5; 
                this.theta = Math.PI; this.phi = Math.PI / 3.2; 
                this.alignTimer = 0; this.alignDelay = 0.8; this.rotateSpeed = 2.8;
                this.rotationWeight = 0; this.followSpeed = 6.0; this.lookAtPos = new THREE.Vector3();
                this.isManual = false;
            }
            update(dt) {
                const charBase = this.target.mesh.position.clone();
                const charPivot = charBase.clone().add(new THREE.Vector3(0, 0.9, 0));
                const lookAtTarget = charBase.clone().add(new THREE.Vector3(0, 2.2, 0));
                
                const isForward = this.input.keys['w'];
                const isSAD = this.input.keys['s'] || this.input.keys['a'] || this.input.keys['d'];
                const isAnyMovement = isForward || isSAD;

                if (this.input.isRightMouseDown) {
                    this.isManual = true; this.alignTimer = 0;
                    this.theta += this.input.mouseMovement.x * 0.005;
                    this.phi -= this.input.mouseMovement.y * 0.005;
                    this.phi = THREE.MathUtils.clamp(this.phi, 0.2, Math.PI / 2.2);
                } else {
                    if (isSAD) { this.isManual = true; this.alignTimer = 0; } 
                    else if (isForward) { this.alignTimer += dt; if (this.alignTimer > this.alignDelay) this.isManual = false; } 
                    else if (!isAnyMovement) { this.isManual = false; }
                }

                if (!this.isManual && !this.input.isRightMouseDown) {
                    this.rotationWeight = THREE.MathUtils.lerp(this.rotationWeight, 1.0, 1.8 * dt);
                    const charForward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.target.mesh.quaternion);
                    const targetTheta = Math.atan2(charForward.x, charForward.z) + Math.PI;
                    let diff = targetTheta - this.theta;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.theta += diff * this.rotateSpeed * dt * this.rotationWeight;
                } else { this.rotationWeight = 0; }

                const sinPhi = Math.sin(this.phi);
                const offset = new THREE.Vector3(
                    this.distance * sinPhi * Math.sin(this.theta),
                    this.distance * Math.cos(this.phi),
                    this.distance * sinPhi * Math.cos(this.theta)
                );
                
                this.camera.position.lerp(charPivot.clone().add(offset), this.followSpeed * dt);
                this.lookAtPos.lerp(lookAtTarget, 10 * dt);
                this.camera.lookAt(this.lookAtPos);

                if (this.target.game && this.target.game.shakeTimer > 0) {
                    const amt = this.target.game.shakeIntensity;
                    this.camera.position.x += (Math.random() - 0.5) * amt;
                    this.camera.position.y += (Math.random() - 0.5) * amt;
                    this.camera.position.z += (Math.random() - 0.5) * amt;
                }
            }
        }

        /**
         * ==========================================
         * [3] FSM (State Machine)
         * ==========================================
         */
        class StateMachine {
            constructor() { this.states = {}; this.currentState = null; }
            addState(name, state) { this.states[name] = state; }
            changeState(name, params) { 
                if (this.currentState && this.currentState.exit) this.currentState.exit();
                this.currentState = this.states[name];
                if (this.currentState && this.currentState.enter) this.currentState.enter(params);
            }
            update(dt) { if (this.currentState && this.currentState.update) this.currentState.update(dt); }
        }

        class State { constructor(parent) { this.parent = parent; } enter(params) {} exit() {} update(dt) {} }

        class HurtState extends State {
            constructor(parent) { super(parent); this.name = 'hurt'; }
            enter(params) {
                this.timer = 0;
                this.duration = 0.6; // 애니메이션 총 시간
                this.knockbackDelay = 0.15; // 넉백 시작 전 지연 시간 (피격 동작 선재생)
                this.parent.velocity.set(0, 0, 0);

                if (params && params.kbDir) {
                    this.kbDir = params.kbDir;
                    this.kbSpeed = params.kbSpeed || 15.0;
                    this.knockbackTriggered = false;
                }
            }
            update(dt) {
                this.timer += dt;
                this.parent.animateHurt(dt);

                // 지연 시간 이후에 넉백 트리거
                if (this.kbDir && !this.knockbackTriggered && this.timer >= this.knockbackDelay) {
                    this.knockbackTriggered = true;
                    this.parent.knockbackTimer = 0.1; 
                    this.parent.knockbackVelocity.copy(this.kbDir.clone().multiplyScalar(this.kbSpeed));
                }

                if (this.timer >= this.duration) {
                    this.parent.stateMachine.changeState('idle');
                }
            }
            exit() { this.parent.velocity.set(0, 0, 0); }
        }

        class IdleState extends State {
            constructor(parent) { super(parent); this.name = 'idle'; }
            update(dt) {
                if (this.parent.input.shiftTriggered) { this.parent.stateMachine.changeState('dash'); return; }
                if (this.parent.input.attackTriggered) { 
                    this.parent.stateMachine.changeState('attack'); 
                    return; 
                }
                const isMoving = this.parent.input.keys['w'] || this.parent.input.keys['a'] || this.parent.input.keys['s'] || this.parent.input.keys['d'];
                if (isMoving) { this.parent.stateMachine.changeState('walk'); return; }

                let lookDir = new THREE.Vector3();
                let shouldAlign = false;

                if (this.parent.isCombatMode && this.parent.nearestDummy) {
                    lookDir.subVectors(this.parent.nearestDummy.mesh.position, this.parent.mesh.position).setY(0);
                    shouldAlign = true;
                } else if (!this.parent.game.cameraRig.isManual) {
                    this.parent.camera.getWorldDirection(lookDir);
                    lookDir.setY(0);
                    shouldAlign = true;
                }

                if (shouldAlign && lookDir.lengthSq() > 0.0001) {
                    lookDir.normalize();
                    const targetAngle = Math.atan2(lookDir.x, lookDir.z);
                    const alpha = Math.min(0.99, 6.0 * dt);
                    this.parent.mesh.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetAngle), alpha);
                }

                this.parent.velocity.lerp(new THREE.Vector3(0, 0, 0), this.parent.damping * dt);
                this.parent.animateIdle(dt);
            }
        }

        class WalkState extends State {
            constructor(parent) { super(parent); this.name = 'walk'; }
            update(dt) {
                if (this.parent.input.shiftTriggered) { this.parent.stateMachine.changeState('dash'); return; }
                if (this.parent.input.attackTriggered) { 
                    this.parent.stateMachine.changeState('attack'); 
                    return; 
                }
                const inputDir = this.parent.calculateMovement(dt);
                if (inputDir.lengthSq() < 0.01) { this.parent.stateMachine.changeState('idle'); return; }
                this.parent.velocity.lerp(inputDir.multiplyScalar(this.parent.maxSpeed), this.parent.acceleration * dt);
                this.parent.animateWalk(dt);
            }
        }

        class DashState extends State {
            constructor(parent) { super(parent); this.name = 'dash'; }
            enter() {
                this.timer = 0; this.duration = 0.25; this.dashDir = new THREE.Vector3();
                const isMoving = this.parent.input.keys['w'] || this.parent.input.keys['a'] || this.parent.input.keys['s'] || this.parent.input.keys['d'];
                if (isMoving) {
                    const inputDir = this.parent.calculateMovement(0.016); 
                    if (inputDir.lengthSq() > 0.001) {
                        this.dashDir.copy(inputDir).normalize();
                        this.parent.mesh.quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.atan2(this.dashDir.x, this.dashDir.z));
                    }
                    this.dashSpeed = 8.0; // [수정] 15.0 -> 8.0 (시간 0.25s * 8.0 = 2m)
                    this.isBackDash = false;
                } else {
                    this.dashDir.set(0,0,1).applyQuaternion(this.parent.mesh.quaternion).multiplyScalar(-1);
                    this.dashSpeed = 8.0; // [수정] 15.0 -> 8.0 (시간 0.25s * 8.0 = 2m)
                    this.isBackDash = true;  
                }
            }
            update(dt) {
                if (this.parent.input.attackTriggered) { 
                    this.parent.stateMachine.changeState('attack', { forceDash: true }); 
                    return; 
                }

                this.timer += dt;
                if (this.timer < this.duration) {
                    this.parent.velocity.copy(this.dashDir).multiplyScalar(this.dashSpeed);

                    const lerpSpeed = Math.min(1, 25 * dt); 

                    if (this.isBackDash) {
                        this.parent.parts.root.rotation.x = THREE.MathUtils.lerp(this.parent.parts.root.rotation.x, -0.6, lerpSpeed); 
                        this.parent.parts.root.rotation.y = THREE.MathUtils.lerp(this.parent.parts.root.rotation.y, -0.6, lerpSpeed);
                        this.parent.parts.waist.rotation.y = THREE.MathUtils.lerp(this.parent.parts.waist.rotation.y, 0.2, lerpSpeed);
                        this.parent.parts.chest.rotation.y = THREE.MathUtils.lerp(this.parent.parts.chest.rotation.y, 0.2, lerpSpeed);

                        this.parent.parts.root.position.y = THREE.MathUtils.lerp(this.parent.parts.root.position.y, 0.85, lerpSpeed); 
                        
                        this.parent.parts.waist.rotation.x = THREE.MathUtils.lerp(this.parent.parts.waist.rotation.x, 0.6, lerpSpeed); 
                        this.parent.parts.chest.rotation.x = THREE.MathUtils.lerp(this.parent.parts.chest.rotation.x, 0.3, lerpSpeed); 
                        this.parent.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parent.parts.neck.rotation.x, 0.1, lerpSpeed);

                        this.parent.lerpJoint(this.parent.parts.leftLeg.hip, new THREE.Vector3(-1.0, 0, -0.1), lerpSpeed);
                        this.parent.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parent.parts.leftLeg.knee.rotation.x, 0.05, lerpSpeed); 

                        this.parent.lerpJoint(this.parent.parts.rightLeg.hip, new THREE.Vector3(-1.4, 0, 0.2), lerpSpeed);
                        this.parent.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parent.parts.rightLeg.knee.rotation.x, 1.5, lerpSpeed); 

                        this.parent.lerpJoint(this.parent.parts.leftArm.shoulder, new THREE.Vector3(-1.2, 0.2, 0.4), lerpSpeed);
                        this.parent.parts.leftArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parent.parts.leftArm.elbow.rotation.x, -0.1, lerpSpeed); 

                        this.parent.lerpJoint(this.parent.parts.rightArm.shoulder, new THREE.Vector3(0.5, 0, -0.6), lerpSpeed);
                        this.parent.parts.rightArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parent.parts.rightArm.elbow.rotation.x, -0.2, lerpSpeed);
                        this.parent.parts.rightArm.wrist.rotation.set(1.4, 0.2, 0); 
                        
                    } else {
                        this.parent.parts.root.rotation.x = THREE.MathUtils.lerp(this.parent.parts.root.rotation.x, 0.2, lerpSpeed); 
                        this.parent.parts.root.rotation.y = THREE.MathUtils.lerp(this.parent.parts.root.rotation.y, 0, lerpSpeed);
                        this.parent.parts.waist.rotation.y = THREE.MathUtils.lerp(this.parent.parts.waist.rotation.y, 0, lerpSpeed);
                        this.parent.parts.chest.rotation.y = THREE.MathUtils.lerp(this.parent.parts.chest.rotation.y, 0, lerpSpeed);

                        this.parent.parts.root.position.y = THREE.MathUtils.lerp(this.parent.parts.root.position.y, 0.62, lerpSpeed);
                        this.parent.parts.waist.rotation.x = THREE.MathUtils.lerp(this.parent.parts.waist.rotation.x, 0.9, lerpSpeed);
                        this.parent.parts.chest.rotation.x = THREE.MathUtils.lerp(this.parent.parts.chest.rotation.x, 0.3, lerpSpeed);
                        this.parent.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parent.parts.neck.rotation.x, -1.0, lerpSpeed); 

                        this.parent.lerpJoint(this.parent.parts.leftLeg.hip, new THREE.Vector3(-1.3, 0, 0), lerpSpeed);
                        this.parent.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parent.parts.leftLeg.knee.rotation.x, 1.2, lerpSpeed);

                        this.parent.lerpJoint(this.parent.parts.rightLeg.hip, new THREE.Vector3(1.1, 0, 0), lerpSpeed);
                        this.parent.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parent.parts.rightLeg.knee.rotation.x, 0.1, lerpSpeed);

                        this.parent.lerpJoint(this.parent.parts.leftArm.shoulder, new THREE.Vector3(-0.8, 0, 0.2), lerpSpeed);
                        this.parent.parts.leftArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parent.parts.leftArm.elbow.rotation.x, -0.3, lerpSpeed);

                        this.parent.lerpJoint(this.parent.parts.rightArm.shoulder, new THREE.Vector3(1.2, 0, -0.4), lerpSpeed);
                        this.parent.parts.rightArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parent.parts.rightArm.elbow.rotation.x, -0.1, lerpSpeed);
                        this.parent.parts.rightArm.wrist.rotation.set(1.5, -0.8, 0.2);
                    }

                } else { this.parent.stateMachine.changeState('idle'); }
            }
            exit() { this.parent.velocity.set(0,0,0); }
        }

        class AttackState extends State {
            constructor(parent) { super(parent); this.name = 'attack'; }
            enter(params) {
                this.comboStep = 1; 

                if (params && params.nextStep) {
                    this.comboStep = params.nextStep;
                } else if (params && params.forceDash) {
                    this.comboStep = 'dash';
                } else {
                    // [수정] 매번 가장 가까운 적을 새로 찾지 않고, CharacterFS.update에서 계산된 nearestDummy를 사용
                    // nearestDummy는 이미 공격자(attacker)를 우선시하도록 구현되어 있음
                    const target = this.parent.nearestDummy;
                    const dist = target ? this.parent.mesh.position.distanceTo(target.mesh.position) : Infinity;
                    
                    if (target && dist <= 10.0) {
                        if (dist < 1.5) this.comboStep = 'shoulder_bash';
                        else if (dist < 2.0) this.comboStep = 1;
                        else if (dist < 3.0) this.comboStep = 'step_strike'; // 2-3m
                        else if (dist < 6.0) this.comboStep = 'dash'; // 3-6m
                        else if (dist <= 10.0) this.comboStep = 'leap'; // 6-10m
                    } else {
                        this.comboStep = 1;
                    }
                }

                this.inputBuffered = false; this.timer = 0; this.hasHit = false;
                this.parent.setupCombo(this, this.comboStep);
            }
            update(dt) {
                if (this.parent.input.shiftTriggered) { this.parent.stateMachine.changeState('dash'); return; }
                this.timer += dt;
                
                if (this.parent.input.attackTriggered && this.timer > 0.05) this.inputBuffered = true;
                
                this.parent.updateCombo(dt, this);
                if (this.timer >= this.duration) {
                    const isAdvancedFirstStrike = ['shoulder_bash', 'step_strike', 'dash', 'leap'].includes(this.comboStep);
                    if (this.inputBuffered && (isAdvancedFirstStrike || this.comboStep < this.parent.maxCombo)) {
                        let nextStep = 2;
                        if (this.comboStep === 2) nextStep = 3;
                        
                        this.timer = 0; this.hasHit = false; this.inputBuffered = false;
                        this.comboStep = nextStep;
                        this.parent.setupCombo(this, this.comboStep);
                    } else { this.parent.stateMachine.changeState('idle'); }
                }
            }
            exit() { this.parent.velocity.set(0,0,0); }
        }

        /**
         * ==========================================
         * [4] Character FS (Ghostblade Stance Refinement)
         * ==========================================
         */
        class CharacterFS {
            constructor(game, scene, camera, input) {
                this.game = game; this.scene = scene; this.camera = camera; this.input = input;
                this.maxSpeed = 6.0; this.acceleration = 14.0; this.damping = 18.0; this.turnSpeed = 15.0;
                this.attackRange = 2.0; this.radius = 0.45; this.attackAngle = Math.PI / 3; this.maxCombo = 3;
                
                this.velocity = new THREE.Vector3(); 
                this.mesh = new THREE.Group(); 
                this.parts = {};
                this.animTimer = 0; this.knockbackTimer = 0; this.knockbackVelocity = new THREE.Vector3();

                this.isCombatMode = false;
                this.combatTimer = 0;      
                this.aggroRadius = 10.5; // 8.0 -> 10.5로 확대 (도약 사거리 10m 대응)

                // [추가] 피격 횟수 관리
                this.maxHits = 10;
                this.currentHits = 0;

                this.stateMachine = new StateMachine();
                this.stateMachine.addState('idle', new IdleState(this));
                this.stateMachine.addState('walk', new WalkState(this));
                this.stateMachine.addState('attack', new AttackState(this));
                this.stateMachine.addState('dash', new DashState(this));
                this.stateMachine.addState('hurt', new HurtState(this));
                
                this.buildGeometry();
                this.scene.add(this.mesh);

                this.stateMachine.changeState('idle');
            }

            buildGeometry() {
                const headH = 0.23, chestH = 0.25, waistH = 0.14, pelvisH = 0.19; 
                const thighL = 0.3, calfL = 0.5, legH = thighL + calfL; 

                const matChest = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
                const matWaist = new THREE.MeshLambertMaterial({ color: 0x333333 });
                const matPelvis = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
                const matBody = new THREE.MeshLambertMaterial({ color: 0x444444 }); 
                const matSkin = new THREE.MeshLambertMaterial({ color: 0xffdbac });
                const matR = new THREE.MeshLambertMaterial({ color: 0xe91e63 }); 
                const matL = new THREE.MeshLambertMaterial({ color: 0x2196f3 }); 

                const root = new THREE.Group(); 
                root.position.y = legH; 
                this.mesh.add(root); this.parts.root = root; 

                const pelvisMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, pelvisH, 0.22), matPelvis);
                pelvisMesh.position.y = pelvisH / 2; root.add(pelvisMesh); this.parts.pelvisMesh = pelvisMesh;

                const waistJoint = new THREE.Group(); waistJoint.position.y = pelvisH; root.add(waistJoint); this.parts.waist = waistJoint;
                const waistMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, waistH, 0.16), matWaist);
                waistMesh.position.y = waistH / 2; waistJoint.add(waistMesh); this.parts.waistMesh = waistMesh; 

                const chestJoint = new THREE.Group(); chestJoint.position.y = waistH; waistJoint.add(chestJoint); this.parts.chest = chestJoint;
                const chestMesh = new THREE.Mesh(new THREE.BoxGeometry(0.33, chestH, 0.2), matChest);
                chestMesh.position.y = chestH / 2; chestJoint.add(chestMesh); this.parts.chestMesh = chestMesh;

                const neckJoint = new THREE.Group(); neckJoint.position.y = chestH; chestJoint.add(neckJoint); this.parts.neck = neckJoint;
                
                const headW = 0.19, headD = 0.21;
                const headMesh = new THREE.Mesh(new THREE.BoxGeometry(headW, headH, headD), matSkin);
                headMesh.position.y = headH / 2 + 0.03; neckJoint.add(headMesh); this.parts.head = headMesh;

                const nose = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
                nose.position.set(0, -0.02, headD / 2 + 0.02); headMesh.add(nose); this.parts.nose = nose;
                nose.visible = false; 

                const matHair = new THREE.MeshLambertMaterial({ color: 0x2c3e50 }); 
                const hairTop = new THREE.Mesh(new THREE.BoxGeometry(headW + 0.04, 0.06, headD + 0.04), matHair);
                hairTop.position.y = headH / 2 + 0.01; headMesh.add(hairTop);
                
                const hairFront = new THREE.Mesh(new THREE.BoxGeometry(headW + 0.04, 0.1, 0.05), matHair);
                hairFront.position.set(0, headH / 2 - 0.03, headD / 2 + 0.02); headMesh.add(hairFront);
                
                const hairBack = new THREE.Mesh(new THREE.BoxGeometry(headW + 0.03, 0.38, 0.08), matHair);
                hairBack.position.set(0, -0.05, -headD / 2 - 0.02); headMesh.add(hairBack);
                
                const hairSideW = 0.03;
                const hairSideR = new THREE.Mesh(new THREE.BoxGeometry(hairSideW, 0.2, 0.1), matHair);
                hairSideR.position.set(headW / 2 + 0.02, 0.03, -0.04); headMesh.add(hairSideR);
                
                const hairSideL = new THREE.Mesh(new THREE.BoxGeometry(hairSideW, 0.2, 0.1), matHair);
                hairSideL.position.set(-headW / 2 - 0.02, 0.03, -0.04); headMesh.add(hairSideL);

                this.baseMats = { body: matBody, skin: matSkin }; this.debugMats = { R: matR, L: matL };

                const armW = 0.08, upperArmL = 0.32, forearmL = 0.35, handS = 0.07; 
                const createArm = (isRight) => {
                    const side = isRight ? -1 : 1; const mat = isRight ? matR : matL;
                    const shoulder = new THREE.Group(); shoulder.position.set(0.23 * side, chestH * 0.8, 0); chestJoint.add(shoulder); 
                    const upperArmMesh = new THREE.Mesh(new THREE.BoxGeometry(armW, upperArmL, armW), mat); upperArmMesh.position.y = -upperArmL / 2; shoulder.add(upperArmMesh);
                    const elbowJoint = new THREE.Group(); elbowJoint.position.y = -upperArmL; shoulder.add(elbowJoint); 
                    const forearmMesh = new THREE.Mesh(new THREE.BoxGeometry(armW * 0.9, forearmL, armW * 0.9), mat); forearmMesh.position.y = -forearmL / 2; elbowJoint.add(forearmMesh);
                    const wristJoint = new THREE.Group(); wristJoint.position.y = -forearmL; elbowJoint.add(wristJoint);
                    const handMesh = new THREE.Mesh(new THREE.BoxGeometry(handS, handS, handS), matSkin); handMesh.position.y = -handS / 2; wristJoint.add(handMesh);
                    return { shoulder, elbow: elbowJoint, wrist: wristJoint, upperArmMesh, forearmMesh };
                };
                this.parts.rightArm = createArm(true); this.parts.leftArm = createArm(false);

                const sword = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 1.2), new THREE.MeshLambertMaterial({color: 0x00e5ff, emissive: 0x005577}));
                sword.position.set(0, -handS / 2, 0.6); 
                sword.scale.set(0.001, 0.001, 0.001); 
                sword.visible = false;
                this.parts.rightArm.wrist.add(sword);
                this.parts.sword = sword;

                const thighW = 0.16, calfW = 0.11;   
                const createLeg = (isRight) => {
                    const side = isRight ? -1 : 1; const mat = isRight ? matR : matL;
                    const hipJoint = new THREE.Group(); hipJoint.position.set(0.11 * side, 0, 0); root.add(hipJoint); 
                    const thighMesh = new THREE.Mesh(new THREE.BoxGeometry(thighW, thighL, thighW), mat); thighMesh.position.y = -thighL / 2; hipJoint.add(thighMesh);
                    const kneeJoint = new THREE.Group(); kneeJoint.position.y = -thighL; hipJoint.add(kneeJoint); 
                    const calfMesh = new THREE.Mesh(new THREE.BoxGeometry(calfW, calfL, calfW), mat); calfMesh.position.y = -calfL / 2; kneeJoint.add(calfMesh);
                    return { hip: hipJoint, knee: kneeJoint, thighMesh, calfMesh };
                };
                this.parts.rightLeg = createLeg(true); this.parts.leftLeg = createLeg(false);
            }

            setDebugMode(isEnabled) {
                const rightMat = isEnabled ? this.debugMats.R : this.baseMats.body;
                const leftMat = isEnabled ? this.debugMats.L : this.baseMats.body;
                const rightSkinMat = isEnabled ? this.debugMats.R : this.baseMats.skin;
                const leftSkinMat = isEnabled ? this.debugMats.L : this.baseMats.skin;
                this.parts.rightArm.upperArmMesh.material = rightMat; this.parts.rightArm.forearmMesh.material = rightSkinMat;
                this.parts.leftArm.upperArmMesh.material = leftMat; this.parts.leftArm.forearmMesh.material = leftSkinMat;
                this.parts.rightLeg.thighMesh.material = rightMat; this.parts.rightLeg.calfMesh.material = rightSkinMat;
                this.parts.leftLeg.thighMesh.material = leftMat; this.parts.leftLeg.calfMesh.material = leftSkinMat;
                if (this.parts.nose) this.parts.nose.visible = isEnabled;
            }

            calculateMovement(dt) {
                const camDir = new THREE.Vector3(); this.camera.getWorldDirection(camDir); camDir.y = 0; 
                if (camDir.lengthSq() > 0.001) camDir.normalize();
                
                const camLeft = new THREE.Vector3(0, 1, 0).cross(camDir);
                if (camLeft.lengthSq() > 0.001) camLeft.normalize();

                const inputDir = new THREE.Vector3();
                if (this.input.keys['w']) inputDir.add(camDir); if (this.input.keys['s']) inputDir.sub(camDir);
                if (this.input.keys['a']) inputDir.add(camLeft); if (this.input.keys['d']) inputDir.sub(camLeft);
                
                if (inputDir.lengthSq() > 0.0001) {
                    inputDir.normalize();
                    const targetAngle = Math.atan2(inputDir.x, inputDir.z);
                    const alpha = Math.min(0.99, this.turnSpeed * dt);
                    this.mesh.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetAngle), alpha);
                }
                return inputDir;
            }

            lerpJoint(joint, targetVec, alpha) {
                const safeAlpha = Math.min(1, alpha);
                joint.rotation.x = THREE.MathUtils.lerp(joint.rotation.x, targetVec.x, safeAlpha);
                joint.rotation.y = THREE.MathUtils.lerp(joint.rotation.y, targetVec.y, safeAlpha);
                joint.rotation.z = THREE.MathUtils.lerp(joint.rotation.z, targetVec.z, safeAlpha);
            }

            takeDamage(kbDir, kbSpeed = 15.0) {
                let safeKbDir = kbDir;
                if (!safeKbDir || safeKbDir.lengthSq() < 0.0001) {
                    safeKbDir = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion).multiplyScalar(-1);
                } else {
                    safeKbDir = safeKbDir.clone().normalize();
                }

                // [추가] 피격 횟수 증가 및 게임 오버 체크
                if (this.game.isGameOver) return; 
                this.currentHits++;
                if (this.currentHits >= this.maxHits) {
                    this.game.showGameOver();
                }

                this.stateMachine.changeState('hurt', { kbDir: safeKbDir, kbSpeed: kbSpeed });
            }

            animateHurt(dt) {
                const lerpSpeed = 15 * dt;
                // 허리를 뒤로 젖히고 팔을 벌리는 피격 포즈
                this.parts.root.position.y = THREE.MathUtils.lerp(this.parts.root.position.y, 0.85, lerpSpeed);
                this.parts.waist.rotation.x = THREE.MathUtils.lerp(this.parts.waist.rotation.x, -0.4, lerpSpeed);
                this.parts.chest.rotation.x = THREE.MathUtils.lerp(this.parts.chest.rotation.x, -0.3, lerpSpeed);
                this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, -0.5, lerpSpeed);

                this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(-0.5, 0, 1.2), lerpSpeed);
                this.parts.leftArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parts.leftArm.elbow.rotation.x, -0.5, lerpSpeed);
                this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(0.5, 0, 1.2), lerpSpeed);
                this.parts.rightArm.elbow.rotation.x = THREE.MathUtils.lerp(this.parts.rightArm.elbow.rotation.x, -0.5, lerpSpeed);

                this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(-0.4, 0, 0.1), lerpSpeed);
                this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.4, 0, -0.1), lerpSpeed);
            }

            update(dt) {
                let minEnemyDist = Infinity;
                let minAttackerDist = Infinity;
                this.nearestDummy = null;
                let nearestAttacker = null;

                for (let d of this.game.dummies) {
                    let dist = this.mesh.position.distanceTo(d.mesh.position);
                    
                    // [수정] 단순히 isAttacking 뿐만 아니라 role이 'attacker'인 모든 적을 추적 (호들갑 상태 포함)
                    if (d.role === 'attacker' || d.isAttacking) {
                        if (dist < minAttackerDist) {
                            minAttackerDist = dist;
                            nearestAttacker = d;
                        }
                    }

                    if (dist < minEnemyDist) {
                        minEnemyDist = dist;
                        this.nearestDummy = d;
                    }
                }

                // [수정] 공격자로 지정된 적(role='attacker')이나 공격 중인 적이 있다면 최우선 타겟으로 설정
                // AI 활성화 상태(enableNPC_AI)에서 공격자가 지정되면 캐릭터는 해당 적을 추격 및 공격함
                if (nearestAttacker && this.game.enableNPC_AI) {
                    this.nearestDummy = nearestAttacker;
                    minEnemyDist = minAttackerDist;
                }

                if (minEnemyDist < this.aggroRadius || this.stateMachine.currentState === this.stateMachine.states['attack']) {
                    this.combatTimer = 2.0;
                }

                if (this.combatTimer > 0) {
                    this.combatTimer -= dt;
                    this.isCombatMode = true;
                } else {
                    this.isCombatMode = false;
                }

                if (this.isCombatMode) {
                    this.parts.sword.visible = true;
                    // 어깨치기(shoulder_bash) 진행 중에는 무기를 극소형으로 숨김
                    if (this.stateMachine.currentState === this.stateMachine.states['attack'] && this.stateMachine.currentState.comboStep === 'shoulder_bash') {
                        this.parts.sword.scale.lerp(new THREE.Vector3(0.001, 0.001, 0.001), 20 * dt);
                    } else {
                        this.parts.sword.scale.lerp(new THREE.Vector3(1, 1, 1), 20 * dt); 
                    }
                } else {
                    this.parts.sword.scale.lerp(new THREE.Vector3(0.001, 0.001, 0.001), 10 * dt); 
                    if (this.parts.sword.scale.x < 0.05) this.parts.sword.visible = false;
                }

                if (this.knockbackTimer > 0) {
                    this.knockbackTimer -= dt; 
                    this.mesh.position.add(this.knockbackVelocity.clone().multiplyScalar(dt));
                    // 넉백 속도 점진적 감쇄 추가
                    this.knockbackVelocity.lerp(new THREE.Vector3(0,0,0), 10 * dt);
                    this.parts.chestMesh.material.color.setHex(0xff0000);
                    if (this.knockbackTimer <= 0) {
                        this.parts.chestMesh.material.color.setHex(0x4a4a4a);
                        this.knockbackVelocity.set(0,0,0);
                    }
                }
                
                this.stateMachine.update(dt);
                if (this.knockbackTimer <= 0) {
                    this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
                }
                
                for (let d of this.game.dummies) {
                    let dist = this.mesh.position.distanceTo(d.mesh.position);
                    if (dist < this.radius + d.bodyRadius && dist > 0.001) {
                        let pushDir = new THREE.Vector3().subVectors(this.mesh.position, d.mesh.position).setY(0);
                        let pushDistSq = pushDir.lengthSq();
                        if (pushDistSq > 0.0001) {
                            pushDir.divideScalar(Math.sqrt(pushDistSq));
                            // 충돌 보정 계수 완화 (0.2 -> 0.1) 및 보정값 제한
                            const pushAmt = Math.min(0.1, (this.radius + d.bodyRadius - dist) * 0.1);
                            this.mesh.position.add(pushDir.multiplyScalar(pushAmt));
                        } else {
                            // 완전히 겹쳤을 경우 랜덤한 방향으로 아주 살짝 밀어냄
                            const randomDir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize();
                            this.mesh.position.add(randomDir.multiplyScalar(0.01));
                        }
                    }
                }
            }

            animateIdle(dt) {
                this.animTimer += dt * 1.5;
                const breath = Math.sin(this.animTimer) * 0.04;
                
                let targetLookAngle = 0;

                if (this.isCombatMode && this.nearestDummy) {
                    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                    const toTarget = new THREE.Vector3().subVectors(this.nearestDummy.mesh.position, this.mesh.position).setY(0);
                    if (toTarget.lengthSq() > 0.001) {
                        toTarget.normalize();
                        const cross = new THREE.Vector3().crossVectors(forward, toTarget);
                        const dot = forward.dot(toTarget);
                        targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                    }
                } else if (this.velocity.lengthSq() > 0.01) {
                    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                    const moveDir = this.velocity.clone().setY(0).normalize();
                    const cross = new THREE.Vector3().crossVectors(forward, moveDir);
                    const dot = forward.dot(moveDir);
                    targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                }
                
                let targetRootYRot = 0; 
                let targetRootY = 0.8; 
                
                let targetWaistX = 0;
                let targetWaistY = 0; 
                let targetChestX = 0; 
                let targetChestY = 0;

                let targetRKnee = 0.05;
                let targetLKnee = 0.05;
                let targetRHipX = 0;
                let targetRHipY = 0; 
                let targetRHipZ = 0;
                let targetLHipX = 0;
                let targetLHipY = 0;
                let targetLHipZ = 0;

                const rShoulderTarget = new THREE.Vector3(breath * 1.5, 0, 0);
                const rElbowTarget = new THREE.Vector3(-0.15, 0, 0);
                const rWristTarget = new THREE.Vector3(0, 0, 0);
                const lShoulderTarget = new THREE.Vector3(breath * 1.5, 0, 0);
                const lElbowTarget = new THREE.Vector3(-0.15, 0, 0);

                if (this.isCombatMode) {
                    targetRootYRot = -0.8; 
                    targetRootY = 0.72;

                    targetLHipX = -0.4;  
                    targetLHipY = 0;     
                    targetLHipZ = 0.45;  
                    
                    targetRHipX = 0.1;   
                    targetRHipY = 0;     
                    targetRHipZ = -0.45; 
                    
                    targetRKnee = 0.1;   
                    targetLKnee = 0.4;   

                    targetWaistX = 0.1; 
                    targetWaistY = 0.4; 
                    targetChestX = 0.1 + breath * 0.5;
                    targetChestY = 0.4;

                    rShoulderTarget.set(0.2, 0.5, -0.6); 
                    rElbowTarget.set(-0.1, 0, 0); 
                    rWristTarget.set(1.4, -1.0, 0.2); 
                    
                    lShoulderTarget.set(0.2, 0.2, 0.3); 
                    lElbowTarget.set(-1.2, 0, 0);
                }

                const alpha8 = Math.min(1, 8 * dt);
                this.parts.root.rotation.x = THREE.MathUtils.lerp(this.parts.root.rotation.x, 0, alpha8);
                this.parts.root.rotation.y = THREE.MathUtils.lerp(this.parts.root.rotation.y, targetRootYRot, alpha8);
                this.parts.root.position.y = THREE.MathUtils.lerp(this.parts.root.position.y, targetRootY, alpha8);
                
                this.parts.waist.rotation.x = THREE.MathUtils.lerp(this.parts.waist.rotation.x, targetWaistX, alpha8);
                this.parts.waist.rotation.y = THREE.MathUtils.lerp(this.parts.waist.rotation.y, targetWaistY, alpha8); 
                
                this.parts.chest.rotation.set(targetChestX, targetChestY, 0);
                
                let currentBodyTwist = this.parts.root.rotation.y + this.parts.waist.rotation.y + this.parts.chest.rotation.y;
                let targetNeckX = this.isCombatMode ? (-0.1 - breath * 1.5) : (-targetWaistX - breath * 1.5);
                
                const neckAlpha = Math.min(1, 15 * dt);
                this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, targetNeckX, neckAlpha);
                this.parts.neck.rotation.y = THREE.MathUtils.lerp(this.parts.neck.rotation.y, targetLookAngle - currentBodyTwist, neckAlpha);
                this.parts.neck.rotation.z = THREE.MathUtils.lerp(this.parts.neck.rotation.z, 0, neckAlpha);

                const alpha10 = Math.min(1, 10 * dt);
                this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, targetRKnee, alpha10);
                this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, targetLKnee, alpha10);
                
                this.parts.rightLeg.hip.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.x, targetRHipX, alpha10);
                this.parts.rightLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.y, targetRHipY, alpha10);
                this.parts.rightLeg.hip.rotation.z = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.z, targetRHipZ, alpha10);
                
                this.parts.leftLeg.hip.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.x, targetLHipX, alpha10);
                this.parts.leftLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.y, targetLHipY, alpha10);
                this.parts.leftLeg.hip.rotation.z = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.z, targetLHipZ, alpha10);

                this.lerpJoint(this.parts.rightArm.shoulder, rShoulderTarget, 8 * dt);
                this.lerpJoint(this.parts.rightArm.elbow, rElbowTarget, 8 * dt);
                this.lerpJoint(this.parts.rightArm.wrist, rWristTarget, 8 * dt);
                this.lerpJoint(this.parts.leftArm.shoulder, lShoulderTarget, 8 * dt);
                this.lerpJoint(this.parts.leftArm.elbow, lElbowTarget, 8 * dt);
            }

            animateWalk(dt) {
                this.animTimer += dt * 10;
                const swing = Math.sin(this.animTimer);
                const cosSwing = Math.cos(this.animTimer);
                const walkBob = Math.abs(swing) * 0.04;

                let targetLookAngle = 0;

                if (this.isCombatMode && this.nearestDummy) {
                    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                    const toTarget = new THREE.Vector3().subVectors(this.nearestDummy.mesh.position, this.mesh.position).setY(0);
                    if (toTarget.lengthSq() > 0.001) {
                        toTarget.normalize();
                        const cross = new THREE.Vector3().crossVectors(forward, toTarget);
                        const dot = forward.dot(toTarget);
                        targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                    }
                } else if (this.velocity.lengthSq() > 0.01) {
                    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                    const moveDir = this.velocity.clone().setY(0).normalize();
                    const cross = new THREE.Vector3().crossVectors(forward, moveDir);
                    const dot = forward.dot(moveDir);
                    targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                }

                let targetRootYRot = 0;
                let baseRootY = 0.8;
                let targetWaistX = 0;
                let targetWaistY = Math.sin(this.animTimer) * 0.12;
                let kneeBendBase = 0.05; 
                let kneeBendMult = 1.0;
                let hipSwingMult = 0.75; 
                let targetHipZ = 0;
                let hipBaseX = 0;

                const rShoulderTarget = new THREE.Vector3(-swing * 0.5, 0, 0);
                const rElbowTarget = new THREE.Vector3((swing > 0) ? -swing * 0.6 : -0.15, 0, 0);
                const rWristTarget = new THREE.Vector3(0, 0, 0);
                const lShoulderTarget = new THREE.Vector3(swing * 0.5, 0, 0);
                const lElbowTarget = new THREE.Vector3((swing < 0) ? swing * 0.6 : -0.15, 0, 0);

                if (this.isCombatMode) {
                    targetRootYRot = -0.5; 
                    baseRootY = 0.74;  
                    targetWaistX = 0.2; 
                    targetWaistY = 0.2 + Math.sin(this.animTimer) * 0.05; 
                    
                    kneeBendBase = 0.3; 
                    kneeBendMult = 0.7; 
                    hipSwingMult = 0.65; 
                    targetHipZ = -0.35; 
                    hipBaseX = -0.2;

                    rShoulderTarget.set(0.2 - swing * 0.1, 0.5, -0.6);
                    rElbowTarget.set(-0.1, 0, 0);
                    rWristTarget.set(1.4, -1.0, 0.2);
                    
                    lShoulderTarget.set(0.1 + swing * 0.1, 0.1, 0.2);
                    lElbowTarget.set(-1.0, 0, 0);
                }

                const alpha12 = Math.min(1, 12 * dt);
                this.parts.root.rotation.x = THREE.MathUtils.lerp(this.parts.root.rotation.x, 0, alpha12);
                this.parts.root.rotation.y = THREE.MathUtils.lerp(this.parts.root.rotation.y, targetRootYRot, alpha12);
                this.parts.root.position.y = THREE.MathUtils.lerp(this.parts.root.position.y, baseRootY + walkBob, alpha12);
                
                const alpha10 = Math.min(1, 10 * dt);
                this.parts.waist.rotation.x = THREE.MathUtils.lerp(this.parts.waist.rotation.x, targetWaistX, alpha10);
                this.parts.waist.rotation.y = THREE.MathUtils.lerp(this.parts.waist.rotation.y, targetWaistY, alpha10);
                this.parts.chest.rotation.y = THREE.MathUtils.lerp(this.parts.chest.rotation.y, Math.sin(this.animTimer) * 0.08, alpha10);

                let currentBodyTwist = this.parts.root.rotation.y + this.parts.waist.rotation.y + this.parts.chest.rotation.y;
                
                const neckAlpha = Math.min(1, 15 * dt);
                this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, -targetWaistX, neckAlpha);
                this.parts.neck.rotation.y = THREE.MathUtils.lerp(this.parts.neck.rotation.y, targetLookAngle - currentBodyTwist, neckAlpha);
                this.parts.neck.rotation.z = THREE.MathUtils.lerp(this.parts.neck.rotation.z, 0, neckAlpha);

                this.parts.chest.rotation.x = targetWaistX * 0.5;

                const alpha15 = Math.min(1, 15 * dt);
                this.parts.rightLeg.hip.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.x, hipBaseX + swing * hipSwingMult, alpha15);
                this.parts.leftLeg.hip.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.x, hipBaseX - swing * hipSwingMult, alpha15);
                
                this.parts.rightLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.y, 0, alpha15);
                this.parts.leftLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.y, 0, alpha15);
                
                this.parts.rightLeg.hip.rotation.z = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.z, targetHipZ, alpha15);
                this.parts.leftLeg.hip.rotation.z = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.z, -targetHipZ, alpha15);
                
                let targetRKnee = Math.max(0, -cosSwing) * kneeBendMult + kneeBendBase;
                let targetLKnee = Math.max(0, cosSwing) * kneeBendMult + kneeBendBase;
                
                this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, targetRKnee, alpha15);
                this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, targetLKnee, alpha15);

                this.lerpJoint(this.parts.rightArm.shoulder, rShoulderTarget, 12 * dt);
                this.lerpJoint(this.parts.rightArm.elbow, rElbowTarget, 12 * dt);
                this.lerpJoint(this.parts.rightArm.wrist, rWristTarget, 12 * dt);
                this.lerpJoint(this.parts.leftArm.shoulder, lShoulderTarget, 12 * dt);
                this.lerpJoint(this.parts.leftArm.elbow, lElbowTarget, 12 * dt);
            }

            setupCombo(state, step) {
                if (step === 'dash') {
                    state.duration = 0.45;  state.activeEnd = 0.30; 
                } else if (step === 'shoulder_bash') {
                    // 타격 시점을 0.15초로 당기고 전체 시간을 늘려 (0.6초) 오랫동안 자세를 고정하여 밀치는 여운을 남김
                    state.duration = 0.60;  state.activeEnd = 0.15;
                } else if (step === 'step_strike') {
                    state.duration = 0.40;  state.activeEnd = 0.25;
                } else if (step === 'leap') {
                    state.duration = 0.65;  state.activeEnd = 0.50;
                } else {
                    state.duration = step === 3 ? 0.65 : (step === 1 ? 0.50 : 0.40);  
                    state.activeEnd = step === 3 ? 0.45 : 0.25; 
                }
                
                // [수정] 별도로 가까운 적을 찾지 않고, 이미 CharacterFS.update에서 결정된 (공격자 우선) nearestDummy 사용
                let nearest = this.nearestDummy;
                let minDist = nearest ? this.mesh.position.distanceTo(nearest.mesh.position) : Infinity;
                
                if(nearest && minDist <= 10.0) { // 타겟 인식 거리를 10m로 넉넉하게 확장
                    const dir = new THREE.Vector3().subVectors(nearest.mesh.position, this.mesh.position);
                    
                    // [수정] 대시, 스텝 스트라이크, 도약 공격 모두 타겟과의 거리에 맞춰 이동 거리 계산
                    if (['dash', 'step_strike', 'leap'].includes(step)) {
                        const distToTarget = dir.length();
                        const targetDist = Math.max(0.2, distToTarget - 1.2); // 타겟 앞 1.2m 지점까지 이동
                        state.attackDashDist = targetDist;
                    }

                    if (dir.lengthSq() > 0.001) {
                        this.mesh.quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.atan2(dir.x, dir.z));
                    }
                }
            }
            updateCombo(dt, state) {
                const forward = new THREE.Vector3(0,0,1).applyQuaternion(this.mesh.quaternion);
                
                if (state.timer < state.activeEnd) {
                    let dashSpeed = 3.2; // 기본 1타/2타: 0.8m / 0.25s = 3.2
                    
                    // [수정] 사거리별 공격들은 미리 계산된 targetDist를 기반으로 타겟에 도달하도록 속도 조절
                    if (['dash', 'step_strike', 'leap'].includes(state.comboStep)) {
                        const dist = state.attackDashDist || 2.0;
                        dashSpeed = dist / state.activeEnd;
                    }
                    else if (state.comboStep === 'shoulder_bash') dashSpeed = 4.0;
                    else if (state.comboStep === 3) dashSpeed = 3.33;

                    this.velocity.copy(forward).multiplyScalar(dashSpeed); 
                
                    const rotAlpha = Math.min(1, 18 * dt);
                    this.parts.root.rotation.x = THREE.MathUtils.lerp(this.parts.root.rotation.x, 0, rotAlpha);
                    this.parts.root.rotation.y = THREE.MathUtils.lerp(this.parts.root.rotation.y, 0, rotAlpha);
                    this.parts.waist.rotation.y = THREE.MathUtils.lerp(this.parts.waist.rotation.y, 0, rotAlpha);
                    this.parts.rightLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.rightLeg.hip.rotation.y, 0, rotAlpha);
                    this.parts.leftLeg.hip.rotation.y = THREE.MathUtils.lerp(this.parts.leftLeg.hip.rotation.y, 0, rotAlpha);
                    
                    let targetRootY = 0.72; 

                    if (state.comboStep === 'dash' || state.comboStep === 'step_strike') {
                        targetRootY = 0.65; 
                    } else if (state.comboStep === 'leap') {
                        let jumpArc = Math.sin((state.timer / state.activeEnd) * Math.PI);
                        targetRootY = 0.72 + jumpArc * 2.0;
                    } else if (state.comboStep === 'shoulder_bash') {
                        targetRootY = 0.65; 
                    } else if (state.comboStep === 3) {
                        targetRootY = 0.75; 
                    }

                    this.parts.root.position.y = THREE.MathUtils.lerp(this.parts.root.position.y, targetRootY, rotAlpha);
                    
                    // [수정] 무기 스윙 동안 머리 회전 로직 (어깨치기만 회전, 다른 공격은 상체 독립적 시선 유지)
                    if (state.comboStep === 'shoulder_bash') {
                        // 어깨치기: 상체가 왼쪽(+Y)으로 크게 돌아가므로, 고개는 오른쪽(-Y)으로 돌려 어깨에 파묻음
                        let targetNeckX = -0.5;
                        let targetNeckY = -0.8;
                        this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, targetNeckX, rotAlpha);
                        this.parts.neck.rotation.y = THREE.MathUtils.lerp(this.parts.neck.rotation.y, targetNeckY, rotAlpha);
                        this.parts.neck.rotation.z = THREE.MathUtils.lerp(this.parts.neck.rotation.z, 0, rotAlpha);
                    } else {
                        // 공격 행동 중에는 상체 중심이 아닌 독립적인 시점 룰에 따름 (적 또는 전방 주시)
                        let targetLookAngle = 0;
                        if (this.nearestDummy) {
                            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                            const toTarget = new THREE.Vector3().subVectors(this.nearestDummy.mesh.position, this.mesh.position).setY(0);
                            if (toTarget.lengthSq() > 0.001) {
                                toTarget.normalize();
                                const cross = new THREE.Vector3().crossVectors(forward, toTarget);
                                const dot = forward.dot(toTarget);
                                targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                            }
                        } else if (this.velocity.lengthSq() > 0.01) {
                            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                            const moveDir = this.velocity.clone().setY(0).normalize();
                            const cross = new THREE.Vector3().crossVectors(forward, moveDir);
                            const dot = forward.dot(moveDir);
                            targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                        }
                        
                        let currentBodyTwist = this.parts.root.rotation.y + this.parts.waist.rotation.y + this.parts.chest.rotation.y;
                        let targetNeckY = targetLookAngle - currentBodyTwist;
                        
                        // 물리적 한계 (고개가 등 뒤로 넘어가는 것 방지)
                        targetNeckY = THREE.MathUtils.clamp(targetNeckY, -Math.PI / 2, Math.PI / 2);

                        let targetNeckX = (state.comboStep === 'dash') ? -0.5 : -0.2;
                        this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, targetNeckX, rotAlpha);
                        this.parts.neck.rotation.y = THREE.MathUtils.lerp(this.parts.neck.rotation.y, targetNeckY, rotAlpha);
                        this.parts.neck.rotation.z = THREE.MathUtils.lerp(this.parts.neck.rotation.z, 0, rotAlpha);
                    }

                    if (state.comboStep === 'shoulder_bash') {
                        // 기존 (0.6, 0.8) -> (0.65, 0.95) 로 10~20% 상향하여 오른쪽 등/어깨가 극단적으로 앞으로 밀고 나가게 함
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.65, 0.95, 0), 20 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.45, 0.65, 0), 20 * dt);
                        
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-0.2, 0, -0.2), 20 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -1.5;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, 0, 0), 20 * dt); 
                        
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(0.5, 0, 0.5), 20 * dt); 
                        
                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.8, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 1.2, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.5, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.1, 15 * dt);
                    }
                    else if (state.comboStep === 'leap') {
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.8, 0, 0), 10 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.2, 0, 0), 10 * dt);
                        
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-2.8, 0, 0.5), 15 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -0.2;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, 1.0, 0), 15 * dt); 
                        
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(-2.5, 0, -0.5), 15 * dt); 
                        this.parts.leftArm.elbow.rotation.x = -0.5;

                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.4, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 0.8, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.2, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.5, 15 * dt);
                    }
                    else if (state.comboStep === 'step_strike') {
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.3, 0.8, 0), 15 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, 0.6, 0), 15 * dt);
                        
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-1.2, 0, 1.0), 18 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -0.1;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, 0.5, 0), 18 * dt); 
                        
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(0.8, 0, 0.5), 18 * dt); 
                        
                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.6, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 1.0, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.2, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.1, 15 * dt);
                    }
                    else if (state.comboStep === 'dash') {
                        // 대시 공격: 전진하며 검을 강하게 찌르는 동작
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.6, 0.4, 0), 15 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.5, 0.2, 0), 15 * dt);
                        
                        // 오른팔은 균형을 잡기 위해 뒤로 살짝 뻗음 (검이 뒤를 향함)
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-0.5, 0, 0.8), 18 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -0.1;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.0, 0.5, 0), 18 * dt); 
                        
                        // 왼팔을 앞으로 뻗어 앞을 강하게 찌르거나 견제하는 모양
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(1.2, 0, 0.4), 22 * dt); 
                        this.parts.leftArm.elbow.rotation.x = -0.1;
                        this.lerpJoint(this.parts.leftArm.wrist, new THREE.Vector3(1.5, 0.8, -1.2), 22 * dt); 
                        
                        // 하체는 대시하는 듯이 깊게 런지(Lunge) 자세
                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-1.0, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 1.2, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.6, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.1, 15 * dt);
                    }
                    else if (state.comboStep === 1) {
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.2, 1.0, 0), 15 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, 0.8, 0), 15 * dt);
                        
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-1.0, 0, 1.0), 18 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -0.1;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, 0.5, 0), 18 * dt); 
                        
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(0.8, 0, 0.5), 18 * dt); 
                        this.parts.leftArm.elbow.rotation.x = -0.2;

                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.6, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 0.8, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.2, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.1, 15 * dt);
                    } 
                    else if (state.comboStep === 2) {
                        this.lerpJoint(this.parts.waist, new THREE.Vector3(0.2, -1.2, 0), 15 * dt); 
                        this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, -0.8, 0), 15 * dt);
                        
                        this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-1.0, 0, -1.2), 18 * dt); 
                        this.parts.rightArm.elbow.rotation.x = -0.2;
                        this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, -0.5, 0), 18 * dt); 
                        
                        this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(-0.8, 0, -0.5), 18 * dt); 
                        this.parts.leftArm.elbow.rotation.x = -1.2;

                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.3, 0, 0), 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(-0.3, 0, 0), 15 * dt);

                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 0.2, 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.2, 15 * dt);
                    } 
                    else if (state.comboStep === 3) {
                        // 3타는 시간(state.timer)에 따라 두 번 베는 모션으로 분리
                        const halfTime = state.activeEnd / 2; // 발동 시간의 절반(0.225초)

                        if (state.timer < halfTime) {
                            // 첫 번째 베기 (우에서 좌로)
                            // 몸통은 우측(+Y)으로 회전, 오른팔은 원래대로 복구
                            this.lerpJoint(this.parts.waist, new THREE.Vector3(0.3, 0.4, 0), 15 * dt); 
                            this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, 0.4, 0), 15 * dt);
                            
                            this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-0.8, 0, 1.2), 20 * dt); 
                            this.parts.rightArm.elbow.rotation.x = -0.2;
                            this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.0, 0.5, 0), 20 * dt); 
                            
                            // 왼팔은 등 뒤/밖으로 뻗어 반동 균형을 맞춤
                            this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(-0.2, 0, -0.8), 20 * dt); 
                            this.parts.leftArm.elbow.rotation.x = -0.2;
                        } else {
                            // 두 번째 베기 (기본 2타 모션과 동일하게)
                            this.lerpJoint(this.parts.waist, new THREE.Vector3(0.2, -1.2, 0), 25 * dt); 
                            this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, -0.8, 0), 25 * dt);
                            
                            this.lerpJoint(this.parts.rightArm.shoulder, new THREE.Vector3(-1.0, 0, -1.2), 30 * dt); 
                            this.parts.rightArm.elbow.rotation.x = -0.2;
                            this.lerpJoint(this.parts.rightArm.wrist, new THREE.Vector3(1.5, -0.5, 0), 30 * dt); 
                            
                            this.lerpJoint(this.parts.leftArm.shoulder, new THREE.Vector3(-0.8, 0, -0.5), 30 * dt); 
                            this.parts.leftArm.elbow.rotation.x = -1.2;
                        }

                        this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.5, 0, 0), 15 * dt);
                        this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 0.5, 15 * dt);
                        this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(0.2, 0, 0), 15 * dt);
                        this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.1, 15 * dt);
                    }

                    // 3타 연속 타격 로직 (hasHit을 타이머에 따라 초기화)
                    if (state.comboStep === 3 && state.timer > state.activeEnd / 2 && !state.hasSecondHit) {
                        state.hasHit = false; // 두 번째 타격을 위해 초기화
                        state.hasSecondHit = true; 
                    }

                    if (!state.hasHit) {
                        for (let d of this.game.dummies) {
                            const toD = new THREE.Vector3().subVectors(d.mesh.position, this.mesh.position).setY(0);
                            let currentRange = this.attackRange;
                            if (state.comboStep === 'leap') currentRange = 2.5; // 거리를 좁힌 대신 범위를 약간 줄임
                            else if (state.comboStep === 'shoulder_bash') currentRange = 1.2;
                            
                            if (toD.length() < currentRange + d.radius && toD.lengthSq() > 0.001) {
                                if (Math.acos(forward.dot(toD.normalize())) < this.attackAngle + 0.2) {
                                    // 특정 공격(어깨치기, 도약공격)만 적의 행동을 중단(Flinch)시킴
                                    const shouldFlinch = (state.comboStep === 'shoulder_bash' || state.comboStep === 'leap');
                                    const forceKnockdown = (state.comboStep === 'shoulder_bash'); // 어깨치기일 경우 넉다운 트리거
                                    d.takeDamage(shouldFlinch, forceKnockdown); 
                                    state.hasHit = true;
                                    
                                    if (state.comboStep === 'shoulder_bash') {
                                        d.logicalPos.add(forward.clone().multiplyScalar(2.0)); // 어깨치기는 2m 밀어냄
                                    } else if (state.comboStep === 'leap') {
                                        d.logicalPos.add(forward.clone().multiplyScalar(1.0)); // 도약 공격은 1m 밀어냄
                                    }
                                    // 기본 공격(1,2,3), 대시 공격은 밀어내지 않음 (사거리 유지)
                                    
                                    const hitlagTime = (state.comboStep === 3 || state.comboStep === 'leap') ? 0.08 : (state.comboStep === 'dash' ? 0.06 : 0.04);
                                    const shakeIntens = (state.comboStep === 3 || state.comboStep === 'leap') ? 0.3 : (state.comboStep === 'dash' ? 0.15 : 0.1);
                                    this.game.triggerImpact(hitlagTime, shakeIntens);
                                }
                            }
                        }
                    }
                } else {
                    // 회복 페이즈: 벨로시티를 0으로 서서히 감쇄 (sliding 방지)
                    this.velocity.lerp(new THREE.Vector3(0, 0, 0), this.damping * dt);
                    if (this.velocity.lengthSq() < 0.01) this.velocity.set(0,0,0);
                    const recoverAlpha = Math.min(1, 10 * dt);

                    // 회복 페이즈: 컴뱃 아이들 포즈에 가깝게 돌아가도록 목표점 수정
                    this.lerpJoint(this.parts.waist, new THREE.Vector3(0.1, 0.4, 0), recoverAlpha);
                    this.lerpJoint(this.parts.chest, new THREE.Vector3(0.1, 0.4, 0), recoverAlpha);
                    
                    this.lerpJoint(this.parts.rightLeg.hip, new THREE.Vector3(-0.1, 0, -0.2), recoverAlpha);
                    this.lerpJoint(this.parts.leftLeg.hip, new THREE.Vector3(-0.4, 0, 0.2), recoverAlpha);

                    this.parts.root.position.y = THREE.MathUtils.lerp(this.parts.root.position.y, 0.72, recoverAlpha);
                    this.parts.root.rotation.y = THREE.MathUtils.lerp(this.parts.root.rotation.y, -0.8, recoverAlpha);
                    
                    this.parts.rightLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.rightLeg.knee.rotation.x, 0.1, recoverAlpha);
                    this.parts.leftLeg.knee.rotation.x = THREE.MathUtils.lerp(this.parts.leftLeg.knee.rotation.x, 0.4, recoverAlpha);

                    // 회복 페이즈에서도 독립적 시선 유지 (아이들로 넘어갈 때 튀는 현상 방지)
                    let targetLookAngle = 0;
                    if (this.nearestDummy) {
                        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                        const toTarget = new THREE.Vector3().subVectors(this.nearestDummy.mesh.position, this.mesh.position).setY(0);
                        if (toTarget.lengthSq() > 0.001) {
                            toTarget.normalize();
                            const cross = new THREE.Vector3().crossVectors(forward, toTarget);
                            const dot = forward.dot(toTarget);
                            targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                        }
                    } else if (this.velocity.lengthSq() > 0.01) {
                        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                        const moveDir = this.velocity.clone().setY(0).normalize();
                        const cross = new THREE.Vector3().crossVectors(forward, moveDir);
                        const dot = forward.dot(moveDir);
                        targetLookAngle = THREE.MathUtils.clamp(Math.atan2(cross.y, dot), -Math.PI / 2.2, Math.PI / 2.2);
                    }
                    
                    let currentBodyTwist = this.parts.root.rotation.y + this.parts.waist.rotation.y + this.parts.chest.rotation.y;
                    let targetNeckY = targetLookAngle - currentBodyTwist;
                    targetNeckY = THREE.MathUtils.clamp(targetNeckY, -Math.PI / 2, Math.PI / 2);

                    this.parts.neck.rotation.x = THREE.MathUtils.lerp(this.parts.neck.rotation.x, -0.2, recoverAlpha);
                    this.parts.neck.rotation.y = THREE.MathUtils.lerp(this.parts.neck.rotation.y, targetNeckY, recoverAlpha);
                    this.parts.neck.rotation.z = THREE.MathUtils.lerp(this.parts.neck.rotation.z, 0, recoverAlpha);
                }
            }
        }

        /**
         * ==========================================
         * [5] Goblin (Small Monster - 120cm)
         * ==========================================
         */
        class Goblin {
            constructor(scene, position) {
