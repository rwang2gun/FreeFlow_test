                this.mesh = new THREE.Group(); 
                this.mesh.rotation.order = 'YXZ'; // Y(응시) -> X(앞뒤) -> Z(기울기)
                this.mesh.position.copy(position); 
                this.originalPos = position.clone();
                this.logicalPos = position.clone();
                
                // 고블린 스케일 조정 (바닥에서 1.2m 높이, 뭉툭하고 작은 체형)
                const totalHeight = 1.2;
                this.radius = 0.4; 
                this.bodyRadius = 0.3; 
                this.armRadius = 0.7;
                
                this.colorBase = 0x4CAF50; // 기본 녹색 피부
                this.colorMoving = 0x388E3C; // 이동 시 진한 녹색
                
                // 고블린 몸체 (통통한 배럴 형태)
                const bodyGeom = new THREE.CylinderGeometry(0.2, 0.28, totalHeight * 0.6, 12);
                this.matBody = new THREE.MeshLambertMaterial({ color: this.colorBase });
                const body = new THREE.Mesh(bodyGeom, this.matBody);
                body.position.y = totalHeight * 0.4; 
                this.mesh.add(body);

                // 고블린 머리 (몸에 비해 큼)
                const headGeom = new THREE.BoxGeometry(0.35, 0.35, 0.35);
                this.matHead = new THREE.MeshLambertMaterial({ color: this.colorBase });
                const head = new THREE.Mesh(headGeom, this.matHead);
                head.position.y = totalHeight * 0.85;
                this.mesh.add(head);

                // 고블린 뾰족귀
                const earGeom = new THREE.ConeGeometry(0.08, 0.25, 4);
                
                const rightEar = new THREE.Mesh(earGeom, this.matHead);
                rightEar.position.set(-0.25, totalHeight * 0.9, 0);
                rightEar.rotation.z = Math.PI / 3;
                rightEar.rotation.x = -Math.PI / 10;
                this.mesh.add(rightEar);

                const leftEar = new THREE.Mesh(earGeom, this.matHead);
                leftEar.position.set(0.25, totalHeight * 0.9, 0);
                leftEar.rotation.z = -Math.PI / 3;
                leftEar.rotation.x = -Math.PI / 10;
                this.mesh.add(leftEar);

                // 고블린 안광 (Glowing Eyes)
                const eyeGeom = new THREE.BoxGeometry(0.06, 0.06, 0.06);
                const eyeMat = new THREE.MeshLambertMaterial({ 
                    color: 0x000000, 
                    emissive: 0xff0000, 
                    emissiveIntensity: 0.0 
                });
                this.eyeMat = eyeMat; // Store for dynamic updates
                
                this.rightEye = new THREE.Mesh(eyeGeom, eyeMat);
                this.rightEye.position.set(-0.1, totalHeight * 0.88, 0.18);
                this.rightEye.visible = true; // Always visible as requested
                this.mesh.add(this.rightEye);

                this.leftEye = new THREE.Mesh(eyeGeom, eyeMat);
                this.leftEye.position.set(0.1, totalHeight * 0.88, 0.18);
                this.leftEye.visible = true; // Always visible as requested
                this.mesh.add(this.leftEye);

                // 고블린 독립된 팔 및 무기 (몽둥이)
                const armGeom = new THREE.BoxGeometry(0.12, 0.5, 0.12);
                const armMat = new THREE.MeshLambertMaterial({ color: 0x2E7D32 });

                // 오른팔 그룹 (관절 중심점 역할)
                this.rightArm = new THREE.Group();
                this.rightArm.position.set(-0.35, totalHeight * 0.65, 0); // 어깨 위치
                
                const rightArmMesh = new THREE.Mesh(armGeom, armMat);
                rightArmMesh.position.y = -0.25; // 어깨 힌지 아래로 팔이 내려오도록 오프셋
                this.rightArm.add(rightArmMesh);

                // 고블린 무기: 나무 몽둥이 (오른손 끝에 위치)
                // 길이를 0.6에서 1.2로 늘림
                const clubGeom = new THREE.CylinderGeometry(0.08, 0.04, 1.2, 6);
                const clubMat = new THREE.MeshLambertMaterial({ color: 0x5D4037 }); // 짙은 나무색
                const club = new THREE.Mesh(clubGeom, clubMat);
                // 길이가 늘어나서 위로 더 빠지지 않게 위치 조정
                club.position.set(0, -0.6, 0.2); 
                club.rotation.x = Math.PI / 4;   
                this.rightArm.add(club);

                this.mesh.add(this.rightArm);

                // 왼팔 그룹
                this.leftArm = new THREE.Group();
                this.leftArm.position.set(0.35, totalHeight * 0.65, 0); // 어깨 위치
                
                const leftArmMesh = new THREE.Mesh(armGeom, armMat);
                leftArmMesh.position.y = -0.25; // 어깨 힌지 아래로 팔이 내려오도록 오프셋
                this.leftArm.add(leftArmMesh);

                this.mesh.add(this.leftArm);
                
                // 기본 팔 자세 세팅
                this.rightArm.rotation.x = -Math.PI / 6; 
                this.leftArm.rotation.x = 0;
                
                // 고블린 짧은 다리 (양발)
                const legGeom = new THREE.BoxGeometry(0.12, 0.25, 0.15);
                const legMat = new THREE.MeshLambertMaterial({ color: 0x2E7D32 });
                
                this.rightLeg = new THREE.Mesh(legGeom, legMat);
                this.rightLeg.position.set(-0.15, 0.125, 0); 
                this.mesh.add(this.rightLeg);
                
                this.leftLeg = new THREE.Mesh(legGeom, legMat);
                this.leftLeg.position.set(0.15, 0.125, 0);
                this.mesh.add(this.leftLeg);

                scene.add(this.mesh);

                this.hitTimer = 0; 
                this.isAttacking = false;
                this.attackTimer = 0;
                this.attackCooldown = 0;
                this.isDodged = false;      
                this.warningShowed = false; 
                
                this.role = 'watcher'; // 'attacker' or 'watcher'
                this.walkTimer = 0;
                this.orbitOffset = Math.random() * Math.PI * 2; // 각자 다른 위치로 분산하기 위한 오프셋
                this.clubMat = clubMat; // Reference to change color

                // [추가] 넉다운 상태 관리 배수
                this.isKnockdown = false;
                this.knockdownTimer = 0;
            }

            takeDamage(shouldFlinch = true, forceKnockdown = false) { 
                if (forceKnockdown) {
                    this.isKnockdown = true;
                    this.knockdownTimer = 1.5; // 1.5초간 넉다운 상태 유지
                }

                if (shouldFlinch) {
                    this.hitTimer = 0.15; 
                    // 공격 중 피격 시 공격 중단
                    if (this.isAttacking) {
                        this.isAttacking = false;
                        this.attackTimer = 0;
                        this.warningShowed = false;
                        this.isDodged = false;
                        this.mesh.position.y = 0; // 공격 중 피격 시 Y 위치 초기화
                    }
                }
                
                // 공통: 피격 시 색상 변경
                this.matBody.color.setHex(0xff0000); 
                this.matHead.color.setHex(0xff0000);
            }

            update(dt, game) {
                const charPos = game.character.mesh.position;
                const dist = this.logicalPos.distanceTo(charPos);
                
                if (this.attackCooldown > 0) this.attackCooldown -= dt;

                // 위치 보정: 모든 프레임에서 Y를 0으로 유지 (땅속 파묻힘 방지)
                this.logicalPos.y = 0;
                this.mesh.position.y = THREE.MathUtils.lerp(this.mesh.position.y, 0, 10 * dt);

                // 상황별 눈 색상 관리
                if (dist <= 6.0 || game.isAIStarting) {
                    this.eyeMat.color.setHex((dist <= 6.0) ? 0xff0000 : 0x000000); 
                    this.eyeMat.emissiveIntensity = (dist <= 6.0) ? 1.0 : 0.0;

                    const toChar = new THREE.Vector3().subVectors(charPos, this.logicalPos).setY(0);
                    if (toChar.lengthSq() > 0.001) {
                        const targetAngle = Math.atan2(toChar.x, toChar.z);
                        const targetQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), targetAngle);
                        this.mesh.quaternion.slerp(targetQuat, 8 * dt); 
                    }
                } else {
                    this.eyeMat.color.setHex(0x000000); // 평소 검은 눈
                    this.eyeMat.emissiveIntensity = 0.0;
                }

                if (this.hitTimer > 0) {
                    this.hitTimer -= dt;
                    this.mesh.position.x = this.logicalPos.x + (Math.random() - 0.5) * 0.3;
                    this.mesh.position.z = this.logicalPos.z + (Math.random() - 0.5) * 0.3;
                    if (this.hitTimer <= 0) { 
                        this.matBody.color.setHex(this.colorBase); 
                        this.matHead.color.setHex(this.colorBase); 
                        this.mesh.position.copy(this.logicalPos); 
                    }
                    return; // 피격(Flinch) 중에는 이동/AI 중단
                }

                // [수정] 넉다운 애니메이션 처리 (+Z 정면 기준 뒤로 넘어짐)
                // 넘어지는 도중에도 밀려나는 연출(logicalPos 반영)이 가능하도록 return 위치 조정
                if (this.isKnockdown) {
                    this.knockdownTimer -= dt;
                    const fallAngle = -Math.PI / 2.2; 
                    this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, fallAngle, 10 * dt);
                    this.mesh.position.y = THREE.MathUtils.lerp(this.mesh.position.y, 0.25, 10 * dt); 

                    if (this.knockdownTimer <= 0) {
                        this.isKnockdown = false;
                    }
                    this.mesh.position.copy(this.logicalPos);
                    // return 삭제하여 아래의 위치 업데이트 로직이 실행되게 함
                } else {
                    // 기상 시 회전 복구
                    this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, 8 * dt);
                    this.mesh.position.y = THREE.MathUtils.lerp(this.mesh.position.y, 0, 8 * dt);
                }

                // 역할에 따른 색상 및 무기 관리
                if (this.role === 'attacker') {
                    this.clubMat.color.setHex(0xff0000); 
                    this.clubMat.emissive.setHex(0x550000);
                } else {
                    this.clubMat.color.setHex(0x5D4037);
                    this.clubMat.emissive.setHex(0x000000);
                }

                this.matBody.color.setHex(this.colorBase); 
                this.matHead.color.setHex(this.colorBase);
                this.mesh.position.copy(this.logicalPos);

                let isMoving = false;
                let moveTargetPos = null;

                if (game.enableNPC_AI && !game.isAIStarting) {
                    if (this.role === 'attacker') {
                        // 캐릭터에게 2.0m 까지 접근 (기존 2.5m에서 축소)
                        if (dist > 2.0) {
                            moveTargetPos = charPos;
                            isMoving = true;
                        } else if (!this.isAttacking && this.attackCooldown <= 0) {
                            // 거리 도달 시 공격 시작
                            this.isAttacking = true;
                            this.attackTimer = 0;
                            this.hasHitThisCycle = false;
                        }
                    } else {
                        // Watcher: 5m ~ 8m 유지
                        if (dist < 5.0) {
                            // 너무 가까우면 뒤로 물러남
                            const awayDir = new THREE.Vector3().subVectors(this.logicalPos, charPos).setY(0).normalize();
                            moveTargetPos = this.logicalPos.clone().add(awayDir.multiplyScalar(2.0));
                            isMoving = true;
                        } else if (dist > 8.0) {
                            // 너무 멀면 접근
                            moveTargetPos = charPos;
                            isMoving = true;
                        } else {
                            // 5~8m 사이면 주변을 어슬렁거림 (고유 오프셋 적용)
                            this.walkTimer += dt * 0.5;
                            const orbitX = Math.cos(this.walkTimer + this.orbitOffset) * 6.5;
                            const orbitZ = Math.sin(this.walkTimer + this.orbitOffset) * 6.5;
                            const orbitTarget = charPos.clone().add(new THREE.Vector3(orbitX, 0, orbitZ));
                            if (this.logicalPos.distanceTo(orbitTarget) > 1.0) {
                                moveTargetPos = orbitTarget;
                                isMoving = true;
                            }
                        }

                        // [추가] 적끼리 너무 뭉치지 않게 분리(Separation) 힘 적용
                        const separationForce = new THREE.Vector3(0, 0, 0);
                        let neighbors = 0;
                        for (let other of game.dummies) {
                            if (other === this) continue;
                            const dOther = this.logicalPos.distanceTo(other.logicalPos);
                            if (dOther < 2.0 && dOther > 0.0001) { // 1.5m -> 2.0m 이내면 서로 밀어냄
                                const push = new THREE.Vector3().subVectors(this.logicalPos, other.logicalPos).normalize();
                                separationForce.add(push.multiplyScalar(2.0 - dOther));
                                neighbors++;
                            }
                        }
                        if (neighbors > 0) {
                            if (!moveTargetPos) moveTargetPos = this.logicalPos.clone();
                            moveTargetPos.add(separationForce.multiplyScalar(0.5));
                            isMoving = true;
                        }
                    }
                }

                // 이동 처리 및 애니메이션
                if (isMoving && !this.isAttacking) {
                    const moveDir = new THREE.Vector3().subVectors(moveTargetPos, this.logicalPos).setY(0).normalize();
                    const moveSpeed = (this.role === 'attacker') ? 5.5 : 3.0; // 공격자는 더 빠르게 접근
                    this.logicalPos.add(moveDir.multiplyScalar(moveSpeed * dt));

                    // 펭귄 뒤뚱거림 애니메이션
                    const animationSpeed = (this.role === 'attacker') ? 18 : 10;
                    this.walkTimer += dt * animationSpeed;
                    const waddle = Math.sin(this.walkTimer);
                    const legSwing = Math.cos(this.walkTimer) * 0.4;
                    
                    // 몸체 좌우 기울기
                    this.mesh.rotation.z = waddle * 0.15;
                    
                    // 다리 교차
                    this.rightLeg.position.z = legSwing;
                    this.leftLeg.position.z = -legSwing;
                    
                    // 팔 교차
                    this.rightArm.rotation.x = -Math.PI / 6 + legSwing;
                    this.leftArm.rotation.x = -legSwing;
                } else if (!this.isAttacking) {
                    // 아이들
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, 10 * dt);
                    this.rightLeg.position.z = THREE.MathUtils.lerp(this.rightLeg.position.z, 0, 10 * dt);
                    this.leftLeg.position.z = THREE.MathUtils.lerp(this.leftLeg.position.z, 0, 10 * dt);
                    this.rightArm.rotation.x = THREE.MathUtils.lerp(this.rightArm.rotation.x, -Math.PI / 6, 10 * dt);
                    this.leftArm.rotation.x = THREE.MathUtils.lerp(this.leftArm.rotation.x, 0, 10 * dt);
                }

                if (this.isAttacking) {
                    this.attackTimer += dt;
                    
                    // [추가] 공격 중 전방으로 약 2.0m 전진 (대시)
                    // 공격 준비/발동 기간(0.15s ~ 0.8s) 동안 전진
                    if (this.attackTimer > 0.15 && this.attackTimer < 0.8) {
                        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                        const enemyDashSpeed = 2.0 / (0.8 - 0.15); // [수정] 1.5m -> 2.0m / 0.65s
                        this.logicalPos.add(forward.multiplyScalar(enemyDashSpeed * dt));
                    }
                    const duration = 1.0;
                    
                    // 공격 중 뒤뚱거림 초기화
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, 15 * dt);

                    if (this.attackTimer <= 0.5) {
                        const alpha = this.attackTimer / 0.5;
                        this.rightArm.rotation.x = THREE.MathUtils.lerp(-Math.PI / 6, -Math.PI * 0.8, alpha);
                        this.leftArm.rotation.x = THREE.MathUtils.lerp(0, Math.PI / 4, alpha);
                    } else if (this.attackTimer <= 1.0) {
                        if (!this.warningShowed && this.attackTimer >= 0.5) {
                            this.warningShowed = true;
                            const charHeadPos = game.character.mesh.position.clone().add(new THREE.Vector3(0, 1.8, 0));
                            game.indicators.push(new FloatingIndicator(game.scene, "!", charHeadPos, 0xff0000)); // 노란색 -> 빨간색
                        }

                        if (!this.isDodged && this.attackTimer >= 0.5 && this.attackTimer <= 0.75) {
                            if (game.character.input.shiftTriggered || game.character.stateMachine.currentState.name === 'dash') {
                                this.isDodged = true;
                                const gobHeadPos = this.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                                game.indicators.push(new FloatingIndicator(game.scene, "MISS", gobHeadPos, 0xffffff));

                                // [추가] 회피 성공 시 슬로우 모션 발동
                                // 캐릭터는 0.2초, 적 전체는 2.0초간 느려짐
                                game.triggerSlowMo(0.2, 2.0);
                            }
                        }

                        if (this.attackTimer <= 0.6) {
                            this.eyeMat.color.setHex(0xffff00);
                            this.eyeMat.emissive.setHex(0xffff00);
                            this.eyeMat.emissiveIntensity = 10.0;
                        } else {
                            this.eyeMat.color.setHex(0xff0000);
                            this.eyeMat.emissive.setHex(0xff0000);
                            this.eyeMat.emissiveIntensity = 1.0;
                        }

                        const jumpAlpha = (this.attackTimer - 0.5) / 0.5;
                        const jumpHeight = Math.sin(jumpAlpha * Math.PI) * 0.5;
                        this.mesh.position.y = jumpHeight;

                        if (this.attackTimer <= 0.8) {
                            const swingAlpha = (this.attackTimer - 0.5) / 0.3;
                            this.rightArm.rotation.x = THREE.MathUtils.lerp(-Math.PI * 0.8, Math.PI / 3, swingAlpha);
                        }

                        if (this.attackTimer >= 0.8 && !this.hasHitThisCycle) {
                            this.hasHitThisCycle = true;
                            // 적 공격 사거리 축소 (3.2 -> 2.0)
                            if (!this.isDodged && dist < 2.0 && game.character.stateMachine.currentState.name !== 'hurt') {
                                const toTarget = new THREE.Vector3().subVectors(charPos, this.logicalPos).setY(0);
                                if (toTarget.lengthSq() > 0.0001) {
                                    const kbDir = toTarget.normalize();
                                    game.character.takeDamage(kbDir, 15.0);
                                }
                            }
                        }
                    }

                    if (this.attackTimer >= duration) {
                        this.isAttacking = false;
                        this.attackTimer = 0;
                        this.hasHitThisCycle = false;
                        this.isDodged = false;      
                        this.warningShowed = false; 
                        this.mesh.position.y = 0;
                        this.attackCooldown = 0.5; 
                    }
                }
            }
        }

        /**
         * ==========================================
         * [5.5] Floating Indicator (UI Effects)
         * ==========================================
         */
        class FloatingIndicator {
            constructor(scene, text, position, color = 0xffffff) {
                this.scene = scene;
                this.timer = 0;
                this.duration = 1.0;
                
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.font = 'Bold 80px Arial';
                ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
                ctx.textAlign = 'center';
                ctx.fillText(text, 128, 80);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
                this.sprite = new THREE.Sprite(spriteMat);
                this.sprite.position.copy(position);
                this.sprite.scale.set(1.5, 0.75, 1);
                this.scene.add(this.sprite);
            }
            update(dt) {
                this.timer += dt;
                this.sprite.position.y += dt * 0.5;
                this.sprite.material.opacity = 1.0 - (this.timer / this.duration);
                if (this.timer >= this.duration) {
                    this.scene.remove(this.sprite);
                    return false;
                }
                return true;
            }
        }

        /**
         * [추가] 투창 투사체 클래스 (+Z 정면 기준)
         */
        class Spear {
            constructor(scene, startPos, targetPos, game) {
                this.scene = scene;
                this.game = game;
                this.speed = 25;
                this.isDodged = false;
                this.isHit = false;

                // 창 메쉬 생성 (+Z가 날카로운 끝부분)
                const group = new THREE.Group();
                const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.5), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
                shaft.rotation.x = Math.PI / 2; // Z축으로 눕힘
                group.add(shaft);
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
                tip.rotation.x = Math.PI / 2;
                tip.position.z = 0.9; // 정면(+Z)으로 배치
                group.add(tip);

                this.mesh = group;
                this.mesh.position.copy(startPos);
                
                // 타겟 방향으로 회전 (+Z 정면 기준)
                this.mesh.lookAt(targetPos);
                this.direction = new THREE.Vector3().subVectors(targetPos, startPos).normalize();
                
                this.scene.add(this.mesh);
                this.lifeTimer = 2.0; // 2초 후 자동 소멸
            }

            update(dt) {
                if (this.isHit) return false; // 이미 처리된 경우 제거

                // [수정] 이동 시 enemyDt(dt)가 이미 배율이 적용되어 들어오므로 그대로 사용
                this.mesh.position.add(this.direction.clone().multiplyScalar(this.speed * dt));
                this.lifeTimer -= dt;

                // 캐릭터와의 충돌 판정 (+Z 정면 기준)
                const char = this.game.character;
                
                // [수정] 3D 거리 대신 평면(2D) 거리와 높이 차이를 함께 체크 (더 정밀한 판정)
                const diff = new THREE.Vector3().subVectors(this.mesh.position, char.mesh.position);
                const dist2D = Math.sqrt(diff.x * diff.x + diff.z * diff.z);
                const heightDiff = Math.abs(this.mesh.position.y - (char.mesh.position.y + 0.9)); // 캐릭터 중심 높이 기준

                if (dist2D < 0.8 && heightDiff < 1.0 && !this.isDodged) {
                    // 피격 처리
                    const kbDir = this.direction.clone().setY(0).normalize();
                    char.takeDamage(kbDir, 8.0); // 넉백 속도 조정
                    this.isHit = true;
                    this.scene.remove(this.mesh);
                    return false; // 목록에서 제거
                }

                if (this.lifeTimer <= 0) {
                    this.scene.remove(this.mesh);
                    return false; // 목록에서 제거
                }
                return true;
            }
        }

        /**
         * [추가] 고블린 투창병 (+Z 정면 기준 원거리 적)
         */
        class GoblinSpearman extends Goblin {
            constructor(scene, pos) {
                super(scene, pos);
                this.colorBase = 0x2e7d32; // 투창병은 짙은 녹색으로 구분
                this.matBody.color.setHex(this.colorBase);
                this.matHead.color.setHex(this.colorBase);
                
                // [추가] 부모로부터 상속받은 몽둥이 메쉬 제거 및 창으로 교체
                const club = this.rightArm.children.find(c => c instanceof THREE.Mesh && c.geometry.type === 'CylinderGeometry');
                if (club) this.rightArm.remove(club);

                // 창 메쉬 생성 (Spear 클래스와 동일한 외형)
                const spearGroup = new THREE.Group();
                this.spearMatShaft = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                this.spearMatTip = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
                
                const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.5), this.spearMatShaft);
                shaft.rotation.x = Math.PI / 2;
                spearGroup.add(shaft);
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3), this.spearMatTip);
                tip.rotation.x = Math.PI / 2;
                tip.position.z = 0.9;
                spearGroup.add(tip);

                // 투창병 손에 맞게 위치 및 회전 조정
                spearGroup.position.set(0, -0.5, 0);
                // [수정] 창의 머리(Tip)가 뒤(로컬 -Z)를 향하게 뒤집음. 투척 전 자세.
                spearGroup.rotation.x = Math.PI; 
                this.spearMesh = spearGroup; // 애니메이션 제어를 위해 참조 저장
                this.rightArm.add(spearGroup);

                this.attackDuration = 1.2; 
                this.isSpearThrown = false;
                this.isWarningTriggered = false; 
                this.isFussing = false; // [추가] 1초간 호들갑 상태
                this.fussTimer = 0;
                this.activeSpear = null; // [추가] 자신이 생성한 창 직접 참조
            }

            update(dt, game) {
                if (game.isGameOver) return;
                
                const char = game.character;
                const toChar = new THREE.Vector3().subVectors(char.mesh.position, this.logicalPos);
                const dist = toChar.length();

                // 상황별 눈 색상 관리 (부모 클래스 로직 기반으로 투창병에 적용)
                if (dist <= 6.0 || game.isAIStarting) {
                    this.eyeMat.color.setHex(0xff0000); 
                    this.eyeMat.emissiveIntensity = 1.0;
                } else {
                    this.eyeMat.color.setHex(0x000000);
                    this.eyeMat.emissiveIntensity = 0.0;
                }

                // 넉다운 및 피격 상태 처리
                if (this.hitTimer > 0 || this.isKnockdown) {
                    super.update(dt, game);
                    this.spearMatShaft.color.setHex(0x8b4513);
                    this.spearMatTip.color.setHex(0xaaaaaa);
                    this.isFussing = false;
                    this.fussTimer = 0;
                    return;
                }

                // AI 상태 관리
                if (this.role === 'attacker') {
                    // 공격자일 때 창 색상 변경
                    this.spearMatShaft.color.setHex(0xff0000);
                    this.spearMatTip.color.setHex(0xff0000);

                    if (this.isAttacking) {
                        this.attackTimer += dt;
                        
                        // [수정] 팔 들어올리기 애니메이션 (0.0s ~ 0.7s)
                        // 투척을 위해 팔을 뒤로 젖히며 창 방향을 서서히 정면으로 돌림
                        const liftAlpha = Math.min(this.attackTimer / 0.7, 1.0);
                        this.rightArm.rotation.x = THREE.MathUtils.lerp(-Math.PI / 6, -Math.PI * 0.8, liftAlpha);
                        this.spearMesh.rotation.x = THREE.MathUtils.lerp(Math.PI, 0, liftAlpha); // 창을 발사 방향으로 회전

                        // [추가] 공격 시작 후 0.5초 시점에 눈 노란색으로 반짝임
                        if (this.attackTimer >= 0.5 && this.attackTimer <= 0.7) {
                            this.eyeMat.color.setHex(0xffff00);
                            this.eyeMat.emissive.setHex(0xffff00);
                            this.eyeMat.emissiveIntensity = 5.0;
                        } else {
                            this.eyeMat.color.setHex(0xff0000);
                            this.eyeMat.emissive.setHex(0xff0000);
                            this.eyeMat.emissiveIntensity = 1.0;
                        }

                        // 0.5초 시점에 캐릭터 머리 위 전조 출력
                        if (this.attackTimer >= 0.5 && !this.isWarningTriggered) {
                            const charHeadPos = char.mesh.position.clone().add(new THREE.Vector3(0, 2.2, 0));
                            game.indicators.push(new FloatingIndicator(game.scene, "!", charHeadPos, 0xff0000));
                            this.isWarningTriggered = true;
                        }

                        // 0.7초 시점에 투사체 발사
                        if (this.attackTimer >= 0.7 && !this.isSpearThrown) {
                            const startPos = this.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                            const spear = new Spear(game.scene, startPos, char.mesh.position.clone(), game);
                            game.spears.push(spear);
                            this.activeSpear = spear; // [추가] 생성된 창 참조 저장
                            this.isSpearThrown = true;
                        }

                        // 회피 판정 구간 (0.7s ~ 0.9s로 변경)
                        if (!this.isDodged && this.attackTimer >= 0.7 && this.attackTimer <= 0.9) {
                            if (char.input.shiftTriggered || (char.stateMachine.currentState && char.stateMachine.currentState.name === 'dash')) {
                                this.isDodged = true;
                                
                                // [수정] 직접 참조 중인 창을 회피 처리
                                if (this.activeSpear) {
                                    this.activeSpear.isDodged = true;
                                }
                                
                                // 중복 슬로우 모션 방지
                                if (game.enemySlowTimer <= 0) {
                                    game.triggerSlowMo(0.2, 2.0);
                                }
                                
                                const charHeadPos = char.mesh.position.clone().add(new THREE.Vector3(0, 2.2, 0));
                                game.indicators.push(new FloatingIndicator(game.scene, "MISS", charHeadPos, 0xffffff));
                            }
                        }

                        if (this.attackTimer >= this.attackDuration) {
                            this.isAttacking = false;
                            this.isSpearThrown = false;
                            this.isWarningTriggered = false;
                            this.attackTimer = 0;
                            this.attackCooldown = 1.5;
                            // [추가] 공격 종료 시 색상 복구
                            this.spearMatShaft.color.setHex(0x8b4513);
                            this.spearMatTip.color.setHex(0xaaaaaa);
                        }
                        this.mesh.lookAt(char.mesh.position.x, 0, char.mesh.position.z);
                    } else if (this.isFussing) {
                        // [추가] 1초간 호들갑 대기 상태
                        this.fussTimer -= dt;
                        this.mesh.lookAt(char.mesh.position.x, 0, char.mesh.position.z);
                        
                        // 제자리에서 좌우로 흔들리는 호들갑 연출 (누적 방식 대신 절대 각도 lerp/oscillation 사용)
                        const fussWave = Math.sin(Date.now() * 0.02);
                        this.mesh.rotation.z = fussWave * 0.1; // Z축 흔들기
                        this.rightArm.rotation.x = -Math.PI / 6 + fussWave * 0.3;
                        
                        if (this.fussTimer <= 0) {
                            this.mesh.rotation.z = 0; // 상태 종료 시 회전값 초기화
                            this.isFussing = false;
                            this.isAttacking = true;
                            this.isDodged = false;
                        }
                    } else {
                        if (this.attackCooldown > 0) {
                            this.attackCooldown -= dt;
                        }

                        const targetDist = 4.0;
                        if (dist > targetDist + 0.5) {
                            const moveDir = toChar.clone().normalize();
                            this.logicalPos.add(moveDir.multiplyScalar(3 * dt));
                            this.mesh.lookAt(char.mesh.position.x, 0, char.mesh.position.z);
                        } else if (dist < targetDist - 0.5) {
                            const moveDir = toChar.clone().normalize().negate();
                            this.logicalPos.add(moveDir.multiplyScalar(2 * dt));
                            this.mesh.lookAt(char.mesh.position.x, 0, char.mesh.position.z);
                        } else {
                            // 거리 도달 시 호들갑 시작
                            if (this.attackCooldown <= 0) {
                                this.isFussing = true;
                                this.fussTimer = 1.0;
                            }
                            this.mesh.lookAt(char.mesh.position.x, 0, char.mesh.position.z);
                        }
                        this.mesh.position.copy(this.logicalPos);
                    }
                } else {
                    // [추가] 공격자가 아닐 때 창 색상 복구
                    this.spearMatShaft.color.setHex(0x8b4513);
                    this.spearMatTip.color.setHex(0xaaaaaa);
                    super.update(dt, game);
                }
            }
        }

        /**
         * ==========================================
         * [6] Game Core
         * ==========================================
         */
        class Game {
            constructor() {
                this.initThree();
                this.input = new InputManager();
                this.enableDummyAttack = false; 
                this.enableDummyMove = false; 
                this.isPaused = false;
                this.isGameOver = false; // [추가] 게임 오버 상태
                this.indicators = []; // Floating UI 관리 목록
                this.spears = []; // [추가] 활성화된 투창 목록
                
                this.hitStopTimer = 0;
                this.shakeTimer = 0;
                this.shakeIntensity = 0;

                // [추가] 슬로우 모션 타이머 및 배율
                this.charSlowTimer = 0;
                this.enemySlowTimer = 0;
                this.charTimeScale = 1.0;
                this.enemyTimeScale = 1.0;

                // [수정] 모든 적을 120cm 소형 고블린(Goblin)으로 교체
                this.dummies = [
                    new Goblin(this.scene, new THREE.Vector3(0, 0, 10)), 
                    new Goblin(this.scene, new THREE.Vector3(12, 0, -5)),
                    new Goblin(this.scene, new THREE.Vector3(-10, 0, 5)),
                    new GoblinSpearman(this.scene, new THREE.Vector3(-8, 0, -10)) // [추가] 고블린 투창병
                ];
                
                this.character = new CharacterFS(this, this.scene, this.camera, this.input);
                this.cameraRig = new CameraRig(this.camera, this.character, this.input);
                
                this.attackerIdx = -1;
                this.aiCoordinatorTimer = 0;
                this.isAIStarting = false;
                
                this.character.setDebugMode(false);
                
                this.enableNPC_AI = false;
                document.getElementById('cb-npc-ai').addEventListener('change', e => {
                    this.enableNPC_AI = e.target.checked;
                    if (this.enableNPC_AI) {
                        this.isAIStarting = true;
                        this.aiCoordinatorTimer = 1.0; // AI 시작 시 1초간 주시 상태
                        this.attackerIdx = -1;
                        this.dummies.forEach(d => d.role = 'watcher');
                    }
                });
                document.getElementById('cb-debug-axis').addEventListener('change', e => this.character.setDebugMode(e.target.checked));
                // [수정] 재시작 버튼 리스너 추가
                document.getElementById('restart-btn').addEventListener('click', () => this.resetGame());
                
                window.addEventListener('blur', () => { this.isPaused = true; document.getElementById('pause-overlay').style.display='flex'; });
                window.addEventListener('mousedown', () => { if(this.isPaused) { this.isPaused = false; document.getElementById('pause-overlay').style.display='none'; this.clock.getDelta(); } });
                this.clock = new THREE.Clock(); this.animate();
            }

            initThree() {
                this.scene = new THREE.Scene(); this.scene.background = new THREE.Color(0xf0f0f0);
                this.scene.fog = new THREE.Fog(0xf0f0f0, 20, 80);
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.5); dirLight.position.set(10, 20, 10); this.scene.add(dirLight);
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                floor.rotation.x = -Math.PI / 2; this.scene.add(floor); this.scene.add(new THREE.GridHelper(100, 50, 0xcccccc, 0xdddddd));
            }

            updateUI() {
                const stanceBadge = document.getElementById('stance-badge');
                const uiLayer = document.getElementById('ui-layer');
                const distLabel = document.getElementById('distance-label');

                if (this.character.isCombatMode) {
                    stanceBadge.innerText = '상태: 전투 (무기 발도)';
                    stanceBadge.style.background = '#d32f2f'; 
                    uiLayer.style.borderColor = '#d32f2f';
                } else {
                    stanceBadge.innerText = '상태: 평화 (무기 납도)';
                    stanceBadge.style.background = '#4CAF50'; 
                    uiLayer.style.borderColor = '#4CAF50';
                }

                // 타겟 거리 표시 라벨 업데이트 (머리 위)
                if (this.character.nearestDummy) {
                    const dist = this.character.mesh.position.distanceTo(this.character.nearestDummy.mesh.position);
                    distLabel.innerText = `${dist.toFixed(1)}m`;
                    distLabel.style.display = 'block';

                    // 3D 월드 좌표를 2D 화면 좌표로 투영
                    const charPos = this.character.mesh.position.clone();
                    charPos.y += 2.0; // 캐릭터 머리 위 오프셋
                    charPos.project(this.camera);

                    if (charPos.z < 1) { // 카메라 앞 쪽에 있을 때만 렌더링
                        const x = (charPos.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (charPos.y * -0.5 + 0.5) * window.innerHeight;
                        distLabel.style.left = `${x}px`;
                        distLabel.style.top = `${y}px`;
                    } else {
                        distLabel.style.display = 'none';
                    }
                } else {
                    distLabel.style.display = 'none';
                }

                // [추가] HP UI 업데이트
                const hpBadge = document.getElementById('hp-badge');
                if (hpBadge) {
                    hpBadge.innerText = `피격 횟수: ${this.character.currentHits} / ${this.character.maxHits}`;
                }
            }

            // [추가] 게임 오버 표시 메서드
            showGameOver() {
                this.isGameOver = true;
                document.getElementById('gameover-overlay').style.display = 'flex';
            }

            // [추가] 게임 재시작 메서드
            resetGame() {
                this.isGameOver = false;
                this.character.currentHits = 0;
                this.character.mesh.position.set(0, 0, 0);
                this.character.velocity.set(0, 0, 0);
                this.character.stateMachine.changeState('idle');
                
                // [추가] 활성화된 모든 창 제거
                this.spears.forEach(s => this.scene.remove(s.mesh));
                this.spears = [];

                // 적 위치 초기화 및 상태 리셋
                this.dummies.forEach((d, i) => {
                    const originalPositions = [
                        new THREE.Vector3(0, 0, 10),
                        new THREE.Vector3(12, 0, -5),
                        new THREE.Vector3(-10, 0, 5),
                        new THREE.Vector3(-8, 0, -10) // 투창병 초기 위치
                    ];
                    if (originalPositions[i]) {
                        d.logicalPos.copy(originalPositions[i]);
                        d.mesh.position.copy(originalPositions[i]);
                    }
                    d.isAttacking = false;
                    d.attackTimer = 0;
                    d.attackCooldown = 0;
                    d.hitTimer = 0;
                    d.isKnockdown = false;
                    d.role = 'watcher';
                    if (d instanceof GoblinSpearman) {
                        d.isSpearThrown = false;
                        d.isWarningTriggered = false;
                        d.isFussing = false;
                        d.fussTimer = 0;
                        d.spearMatShaft.color.setHex(0x8b4513);
                        d.spearMatTip.color.setHex(0xaaaaaa);
                        d.spearMesh.rotation.x = Math.PI; // 창 방향 초기화
                    }
                });

                this.attackerIdx = -1;
                this.aiCoordinatorTimer = 1.0;
                this.isAIStarting = this.enableNPC_AI;

                document.getElementById('gameover-overlay').style.display = 'none';
                this.clock.getDelta(); // 클락 리셋
            }

            // [추가] 슬로우 모션 시각 효과 업데이트
            updateSlowMoUI() {
                const overlay = document.getElementById('slowmo-overlay');
                if (this.enemySlowTimer > 0) {
                    overlay.style.opacity = '1';
                } else {
                    overlay.style.opacity = '0';
                }
            }

            triggerImpact(hitlag, shakeIntens) {
                this.hitStopTimer = hitlag;
                this.shakeTimer = hitlag + 0.1; 
                this.shakeIntensity = shakeIntens;
            }

            // [추가] 슬로우 모션 트리거 메서드
            triggerSlowMo(charDuration, enemyDuration) {
                this.charSlowTimer = charDuration;
                this.enemySlowTimer = enemyDuration;
                // 구체적인 연출을 위해 배율을 설정 (캐릭터 0.5배속, 적 0.1배속 등)
                // 현재 요구사항은 "느려지는 연출"이므로 배율을 고정하거나 나중에 조정 가능
            }

            updateAI(dt) {
                if (!this.enableNPC_AI) {
                    this.attackerIdx = -1;
                    this.dummies.forEach(d => d.role = 'watcher');
                    return;
                }

                let currentAttacker = this.attackerIdx !== -1 ? this.dummies[this.attackerIdx] : null;

                if (currentAttacker) {
                    // 공격자가 공격을 끝냈거나 피격당한 경우
                    if ((!currentAttacker.isAttacking && currentAttacker.attackCooldown > 0) || currentAttacker.hitTimer > 0) {
                        this.attackerIdx = -1;
                        currentAttacker.role = 'watcher';
                        this.aiCoordinatorTimer = 1.0; // 1.0초 대기 세팅 (기존 0.5초에서 변경)
                    }
                }

                if (this.isAIStarting) {
                    if (this.aiCoordinatorTimer > 0) {
                        this.aiCoordinatorTimer -= dt;
                        return; // 1초간 캐릭터 주시 중
                    }
                    this.isAIStarting = false;
                }

                if (this.attackerIdx === -1) {
                    // 주변 적들 중 하나를 무작위 선택
                    // [수정] 넉다운 상태인 적은 공격자 후보에서 제외
                    const candidates = this.dummies.map((d, i) => ({d, i}))
                        .filter(item => {
                            const dist = item.d.mesh.position.distanceTo(this.character.mesh.position);
                            return dist < 15 && !item.d.isKnockdown;
                        });
                    
                    if (candidates.length > 0) {
                        const pick = candidates[Math.floor(Math.random() * candidates.length)];
                        this.attackerIdx = pick.i;
                        this.dummies.forEach((d, i) => {
                            d.role = (i === this.attackerIdx) ? 'attacker' : 'watcher';
                        });
                    }
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                if (this.isPaused || this.isGameOver) {
                    if (this.isGameOver) {
                        this.renderer.render(this.scene, this.camera);
                    }
                    return;
                }
                
                let dt = this.clock.getDelta();
                if (dt > 0.03) dt = 0.03; 

                // [수정] 슬로우 모션 타이머 업데이트 및 배율 계산을 루프 시작 전으로 이동 (ReferenceError 방지)
                let charDt = dt;
                let enemyDt = dt;

                if (this.charSlowTimer > 0) {
                    this.charSlowTimer -= dt;
                    charDt = dt * 0.5; // 캐릭터는 0.5배속으로 느려짐
                }
                
                if (this.enemySlowTimer > 0) {
                    this.enemySlowTimer -= dt;
                    enemyDt = dt * 0.1; // 적 전체는 0.1배속으로 크게 느려짐
                }

                this.updateAI(dt);

                // [수정] 투창(Spear) 업데이트 (이제 enemyDt가 안전하게 정의됨)
                for (let i = this.spears.length - 1; i >= 0; i--) {
                    if (!this.spears[i].update(enemyDt)) {
                        this.spears.splice(i, 1);
                    }
                }

                // 인디케이터 업데이트
                for (let i = this.indicators.length - 1; i >= 0; i--) {
                    if (!this.indicators[i].update(dt)) {
                        this.indicators.splice(i, 1);
                    }
                }
                
                if (this.hitStopTimer > 0) {
                    this.hitStopTimer -= dt;
                    this.cameraRig.update(dt); 
                    this.renderer.render(this.scene, this.camera);
                    return; 
                }

                if (this.shakeTimer > 0) this.shakeTimer -= dt;

                for(let d of this.dummies) d.update(enemyDt, this);
                this.character.update(charDt); 
                this.cameraRig.update(dt); // 카메라 조작은 항상 1:1 속도 유지
                this.updateSlowMoUI(); // 슬로우 모션 UI 업데이트
                this.updateUI(); 
                
                this.renderer.render(this.scene, this.camera);
                this.input.resetTriggers();
            }
        }
        window.onload = () => new Game();
    </script>
